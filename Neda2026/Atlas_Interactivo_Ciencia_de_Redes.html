<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Atlas Interactivo para Científicos de Redes</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #fff;
        --panel2: #eef4fa;
        --text: #162033;
        --muted: #657187;
        --line: #d8e1ec;
        --blue: #1768e5;
        --cyan: #00a6c7;
        --orange: #ff7a2f;
        --green: #16a276;
        --purple: #7a55d9;
        --red: #e74b5b;
        --shadow: 0 12px 34px #1e385017;
      }
      [data-theme="dark"] {
        --bg: #0e1623;
        --panel: #162234;
        --panel2: #1d2b40;
        --text: #edf4ff;
        --muted: #a7b4c6;
        --line: #304057;
        --blue: #64a3ff;
        --cyan: #2dd4e8;
        --orange: #ff9d64;
        --green: #43d6a7;
        --purple: #b094ff;
        --red: #ff7280;
        --shadow: 0 12px 34px #0005;
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font:
          15px/1.55 Inter,
          Segoe UI,
          Arial,
          sans-serif;
      }
      button,
      input,
      select {
        font: inherit;
      }
      .app {
        display: grid;
        grid-template-columns: 310px 1fr;
        min-height: 100vh;
      }
      .side {
        position: sticky;
        top: 0;
        height: 100vh;
        background: var(--panel);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        z-index: 20;
      }
      .brand {
        padding: 18px 18px 12px;
        border-bottom: 1px solid var(--line);
      }
      .brand b {
        display: block;
        font-size: 18px;
        line-height: 1.2;
      }
      .brand small {
        color: var(--muted);
      }
      .brand-row,
      .top-row,
      .chapter-head,
      .between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .icon {
        border: 1px solid var(--line);
        background: var(--panel2);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .search {
        margin: 12px 14px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--bg);
        color: var(--text);
        width: calc(100% - 28px);
      }
      .nav {
        overflow: auto;
        padding: 0 10px 18px;
      }
      .part-title {
        font-size: 11px;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 14px 9px 5px;
        font-weight: 900;
      }
      .nav button {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        display: grid;
        grid-template-columns: 30px 1fr;
        gap: 8px;
        text-align: left;
        align-items: center;
        padding: 7px 9px;
        border-radius: 9px;
        cursor: pointer;
        font-size: 12px;
      }
      .nav button:hover,
      .nav button.on {
        background: var(--panel2);
        color: var(--blue);
      }
      .nav button.done .n {
        background: var(--green);
      }
      .n {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 11px;
      }
      .side-foot {
        margin-top: auto;
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }
      .progress {
        height: 7px;
        background: var(--panel2);
        border-radius: 99px;
        overflow: hidden;
        margin: 6px 0;
      }
      .progress i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--blue), var(--cyan));
        width: 0;
      }
      .main {
        min-width: 0;
      }
      .top {
        height: 58px;
        position: sticky;
        top: 0;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        z-index: 15;
      }
      .crumb {
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .xp {
        font-weight: 900;
        color: var(--orange);
      }
      .menu {
        display: none;
      }
      .view {
        max-width: 1320px;
        margin: auto;
        padding: 22px 25px 46px;
      }
      .hero {
        background: linear-gradient(125deg, #0e3e86, #1768e5 52%, #00a6c7);
        color: #fff;
        border-radius: 22px;
        padding: 38px;
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }
      .hero:after {
        content: "";
        position: absolute;
        width: 360px;
        height: 360px;
        border: 70px solid #ffffff17;
        border-radius: 50%;
        right: -130px;
        top: -160px;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 11px;
        font-weight: 900;
        color: var(--cyan);
      }
      .hero .eyebrow {
        color: #b9f5ff;
      }
      h1 {
        font-size: clamp(34px, 5vw, 62px);
        line-height: 0.98;
        margin: 12px 0 16px;
        max-width: 800px;
      }
      h2 {
        font-size: 29px;
        line-height: 1.15;
        margin: 5px 0 8px;
      }
      h3 {
        margin: 0 0 8px;
        font-size: 17px;
      }
      p {
        margin: 6px 0 12px;
      }
      .lead {
        font-size: 17px;
        color: var(--muted);
        max-width: 850px;
      }
      .hero .lead {
        color: #e9f3ff;
      }
      .actions,
      .controls,
      .filters,
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .btn {
        border: 0;
        border-radius: 10px;
        background: var(--blue);
        color: #fff;
        padding: 10px 14px;
        font-weight: 850;
        cursor: pointer;
      }
      .btn:hover {
        filter: brightness(1.08);
      }
      .btn.sec {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .btn.warn {
        background: var(--red);
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin: 14px 0;
      }
      .stat,
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }
      .stat {
        padding: 14px;
      }
      .stat b {
        font-size: 25px;
        display: block;
        color: var(--blue);
      }
      .stat span {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        font-weight: 850;
      }
      .section-head {
        margin: 28px 0 12px;
      }
      .parts {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .part-card {
        padding: 17px;
        cursor: pointer;
        transition: 0.2s;
      }
      .part-card:hover {
        transform: translateY(-3px);
        border-color: var(--blue);
      }
      .part-card .roman {
        font-size: 12px;
        color: var(--cyan);
        font-weight: 900;
      }
      .part-card p {
        color: var(--muted);
        font-size: 13px;
      }
      .chapter-head {
        align-items: flex-start;
        background: var(--panel);
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 17px;
      }
      .tag {
        display: inline-flex;
        background: var(--panel2);
        color: var(--blue);
        border: 1px solid var(--line);
        border-radius: 99px;
        padding: 5px 9px;
        font-size: 11px;
        font-weight: 900;
      }
      .tabs {
        margin: 12px 0;
      }
      .tab {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--muted);
        padding: 9px 14px;
        border-radius: 9px;
        font-weight: 850;
        cursor: pointer;
      }
      .tab.on {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
      }
      .grid2 {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
        gap: 12px;
      }
      .grid3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .card {
        padding: 17px;
      }
      .card p,
      .card li {
        color: var(--muted);
      }
      .stack {
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .formula {
        font:
          700 15px/1.5 Consolas,
          monospace;
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        overflow: auto;
        color: var(--purple);
      }
      .concepts {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .concept {
        background: color-mix(in srgb, var(--cyan) 12%, var(--panel));
        border: 1px solid color-mix(in srgb, var(--cyan) 40%, var(--line));
        padding: 6px 9px;
        border-radius: 9px;
        font-weight: 750;
        font-size: 12px;
      }
      .sections {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 7px;
      }
      .section {
        padding: 9px 10px;
        background: var(--panel2);
        border-radius: 8px;
        font-size: 12px;
      }
      .lab-shell {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr) 300px;
        gap: 12px;
        align-items: start;
      }
      .lab-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
      }
      .field {
        margin-bottom: 11px;
      }
      .field label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        margin-bottom: 4px;
        text-transform: uppercase;
      }
      .field input,
      .field select {
        width: 100%;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
      }
      input[type="range"] {
        padding: 0;
      }
      .canvas-wrap {
        position: relative;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        min-height: 520px;
      }
      .canvas-wrap canvas {
        display: block;
        width: 100%;
        height: 520px;
      }
      .canvas-note {
        position: absolute;
        left: 12px;
        top: 12px;
        background: color-mix(in srgb, var(--panel) 88%, transparent);
        padding: 8px 10px;
        border-radius: 9px;
        border: 1px solid var(--line);
        font-size: 12px;
        max-width: 75%;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .metric {
        background: var(--panel2);
        border-radius: 9px;
        padding: 10px;
      }
      .metric b {
        display: block;
        font-size: 20px;
        color: var(--blue);
      }
      .metric span {
        font-size: 10px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .log {
        max-height: 220px;
        overflow: auto;
        font:
          12px/1.5 Consolas,
          monospace;
        background: var(--panel2);
        border-radius: 9px;
        padding: 10px;
      }
      .log div {
        border-bottom: 1px solid var(--line);
        padding: 4px;
      }
      .matrix {
        border-collapse: collapse;
        margin: auto;
        font-size: 12px;
      }
      .matrix td,
      .matrix th {
        border: 1px solid var(--line);
        padding: 7px;
        text-align: center;
        min-width: 32px;
      }
      .matrix td.on {
        background: var(--orange);
        color: white;
      }
      .hist {
        display: flex;
        align-items: flex-end;
        height: 160px;
        gap: 5px;
        padding: 10px;
      }
      .bar {
        flex: 1;
        background: linear-gradient(var(--cyan), var(--blue));
        min-width: 6px;
        border-radius: 4px 4px 0 0;
        position: relative;
      }
      .bar:hover:after {
        content: attr(data-v);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--text);
        color: var(--panel);
        padding: 3px 5px;
        border-radius: 5px;
        font-size: 10px;
      }
      .quiz-q {
        padding: 14px 0;
        border-bottom: 1px solid var(--line);
      }
      .opt {
        display: block;
        padding: 8px;
        border-radius: 8px;
        margin: 5px 0;
        background: var(--panel2);
        cursor: pointer;
      }
      .opt.good {
        outline: 2px solid var(--green);
      }
      .opt.bad {
        outline: 2px solid var(--red);
      }
      .feedback {
        padding: 12px;
        border-radius: 10px;
        background: var(--panel2);
        margin-top: 10px;
      }
      .footer-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 18px;
      }
      .table-wrap {
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px;
        text-align: left;
      }
      th {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .glossary {
        columns: 3;
        column-gap: 12px;
      }
      .term {
        break-inside: avoid;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px;
        margin-bottom: 9px;
      }
      .term b {
        display: block;
        color: var(--blue);
      }
      .term span {
        font-size: 12px;
        color: var(--muted);
      }
      .modal {
        position: fixed;
        inset: 0;
        background: #0008;
        display: none;
        place-items: center;
        z-index: 50;
      }
      .modal.show {
        display: grid;
      }
      .modal .card {
        max-width: 430px;
      }
      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        background: var(--text);
        color: var(--panel);
        padding: 12px 16px;
        border-radius: 10px;
        transform: translateY(80px);
        opacity: 0;
        transition: 0.25s;
        z-index: 60;
      }
      .toast.show {
        transform: none;
        opacity: 1;
      }
      @media (max-width: 1100px) {
        .lab-shell {
          grid-template-columns: 220px 1fr;
        }
        .lab-side {
          grid-column: 1/-1;
        }
        .stats {
          grid-template-columns: repeat(3, 1fr);
        }
        .parts {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }
        .side {
          position: fixed;
          left: -330px;
          width: 310px;
          transition: 0.25s;
        }
        .side.open {
          left: 0;
          box-shadow: 0 0 0 999px #0008;
        }
        .menu {
          display: block;
        }
        .view {
          padding: 15px;
        }
        .grid2,
        .grid3,
        .lab-shell {
          grid-template-columns: 1fr;
        }
        .parts {
          grid-template-columns: 1fr;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
        .sections {
          grid-template-columns: 1fr;
        }
        .glossary {
          columns: 1;
        }
        .canvas-wrap canvas {
          height: 430px;
        }
        .canvas-wrap {
          min-height: 430px;
        }
        .top {
          padding: 0 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side" id="side">
        <div class="brand">
          <div class="brand-row">
            <div><b>Atlas Interactivo</b><small>Ciencia de Redes</small></div>
            <button class="icon" id="theme" title="Cambiar tema">◐</button>
          </div>
        </div>
        <input
          class="search"
          id="search"
          placeholder="Buscar capítulo o concepto..."
        />
        <nav class="nav" id="nav"></nav>
        <div class="side-foot">
          <div class="between">
            <small>Progreso</small><b id="xpSide">0 XP</b>
          </div>
          <div class="progress"><i id="progressBar"></i></div>
          <small id="progressText">0 de 48 capítulos</small>
        </div>
      </aside>
      <main class="main">
        <header class="top">
          <div class="top-row">
            <button class="icon menu" id="menu">☰</button>
            <div class="crumb" id="crumb">Inicio</div>
          </div>
          <div class="xp" id="xp">0 XP</div>
        </header>
        <section class="view" id="view"></section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal" id="resetModal">
      <div class="card">
        <h3>¿Borrar todo el progreso?</h3>
        <p>
          Se eliminarán capítulos completados, evaluaciones y XP guardados en
          este navegador.
        </p>
        <div class="controls">
          <button class="btn warn" id="resetYes">Borrar</button
          ><button class="btn sec" id="resetNo">Cancelar</button>
        </div>
      </div>
    </div>

              s.step % 2
                ? "Modelo Barabási-Albert: adjunción preferencial."
                : "Modelo Watts-Strogatz: reconexión local.",
            );
          } else if (m === "hairball") {
            if (s.g.e.length > Math.max(5, s.g.n)) {
              s.g.e = s.g.e.filter((_, i) => i % 3 !== s.step % 3);
              s.pts = layout(s.g, $("#layout").value);
              log("Se retiró una fracción de enlaces de baja saliencia.");
            } else log("El backbone se estabilizó.");
          } else if (m === "meso") {
            s.labels = s.labels.map((x, i) =>
              degrees(s.g)[i] >= 3 ? 0 : (i % 2) + 1,
            );
            log("Clasificación aproximada en núcleo y periferias.");
          } else if (m === "embedding") {
            s.pts = s.pts.map((p, i) => ({
              x:
                0.12 +
                0.76 *
                  ((degrees(s.g)[i] + (i % 3)) /
                    (Math.max(...degrees(s.g)) + 3)),
              y: 0.15 + 0.7 * (((i * 7) % s.g.n) / (s.g.n - 1 || 1)),
            }));
            log("Proyección vectorial recalculada.");
          } else {
            s.active = (s.active + 1) % s.g.n;
            log("Se actualizó la vista del experimento.");
          }
          drawLab();
        }
        function drawLab() {
          if (!labState) return;
          const s = labState,
            c = $("#canvas"),
            box = c.getBoundingClientRect(),
            dpr = Math.min(2, devicePixelRatio || 1);
          c.width = Math.max(500, box.width) * dpr;
          c.height = Math.max(430, box.height) * dpr;
          const x = c.getContext("2d");
          x.scale(dpr, dpr);
          const W = c.width / dpr,
            H = c.height / dpr;
          if (!["embedding"].includes(s.mode))
            s.pts = layout(s.g, $("#layout").value);
          x.clearRect(0, 0, W, H);
          x.fillStyle = getComputedStyle(
            document.documentElement,
          ).getPropertyValue("--panel");
          x.fillRect(0, 0, W, H);
          const color = ["#1768e5", "#ff7a2f", "#16a276", "#7a55d9", "#e74b5b"];
          const d = degrees(s.g),
            max = Math.max(1, ...d);
          s.g.e.forEach(([u, v]) => {
            if (s.removed.has(u) || s.removed.has(v)) return;
            x.beginPath();
            x.moveTo(s.pts[u].x * W, s.pts[u].y * H);
            x.lineTo(s.pts[v].x * W, s.pts[v].y * H);
            x.strokeStyle = "#8fa2b9";
            x.globalAlpha = 0.45;
            x.lineWidth = 1.2;
            x.stroke();
            x.globalAlpha = 1;
          });
          for (let i = 0; i < s.g.n; i++) {
            if (s.removed.has(i)) continue;
            const p = s.pts[i],
              r = s.mode === "centrality" ? 7 + (12 * d[i]) / max : 9;
            x.beginPath();
            x.arc(p.x * W, p.y * H, r, 0, Math.PI * 2);
            let fill = color[0];
            if (s.mode === "spread")
              fill =
                s.infect[i] === 0
                  ? "#a9b4c3"
                  : s.infect[i] === 1
                    ? "#e74b5b"
                    : "#16a276";
            else if (["community", "meso", "embedding"].includes(s.mode))
              fill = color[s.labels[i] % color.length];
            else if (i === s.active || (s.visited.has(i) && s.mode === "paths"))
              fill = "#ff7a2f";
            x.fillStyle = fill;
            x.fill();
            x.strokeStyle = "#fff";
            x.lineWidth = 2;
            x.stroke();
            x.fillStyle = "#fff";
            x.font = "bold 10px Arial";
            x.textAlign = "center";
            x.textBaseline = "middle";
            x.fillText(i, p.x * W, p.y * H);
          }
          if (s.mode === "matrix") drawMatrix(s);
          else if (s.mode === "degree" || s.mode === "walk")
            drawHist(s.mode === "walk" ? s.visits : d);
          else if (s.mode === "prob") drawBayes(s);
          else $("#below").innerHTML = "";
          const cs = components(
            s.g,
            new Set([...Array(s.g.n).keys()].filter((i) => !s.removed.has(i))),
          );
          $("#note").textContent =
            `${labNames[s.mode]} · ${labExplain(s.mode)}`;
          $("#m1").textContent = s.g.n - s.removed.size;
          $("#l1").textContent = "nodos activos";
          $("#m2").textContent = s.g.e.length;
          $("#l2").textContent = "enlaces";
          $("#m3").textContent = density(s.g).toFixed(2);
          $("#l3").textContent = "densidad";
          $("#m4").textContent =
            s.mode === "failure" ? cs[0]?.length || 0 : s.step;
          $("#l4").textContent =
            s.mode === "failure" ? "componente gigante" : "paso";
          if (s.mode === "prob") {
            const prior = Math.max(0.01, +$("#param").value / 100),
              posterior =
                (0.85 * prior) / (0.85 * prior + 0.12 * (1 - prior));
            $("#m4").textContent = (posterior * 100).toFixed(1) + "%";
            $("#l4").textContent = "posterior Bayes";
          } else if (s.mode === "density") {
            $("#m3").textContent = density(s.g).toFixed(3);
            $("#l3").textContent = "densidad global";
            $("#m4").textContent = clustering(s.g).toFixed(3);
            $("#l4").textContent = "clustering medio";
          } else if (s.mode === "centrality") {
            const hub = d.indexOf(Math.max(...d));
            $("#m4").textContent = `nodo ${hub}`;
            $("#l4").textContent = "máximo grado";
          } else if (s.mode === "walk") {
            $("#m4").textContent = Math.max(...s.visits);
            $("#l4").textContent = "máx. visitas";
          } else if (s.mode === "distance") {
            const ref = makeWS(s.g.n, 4, 0.15, 21);
            const delta =
              Math.abs(density(s.g) - density(ref)) +
              Math.abs(clustering(s.g) - clustering(ref));
            $("#m4").textContent = delta.toFixed(3);
            $("#l4").textContent = "distancia resumen";
          } else if (s.mode === "visual") {
            $("#m4").textContent = $("#layout").value;
            $("#l4").textContent = "layout activo";
          }
          $("#log").innerHTML = s.logs.map((q) => `<div>${q}</div>`).join("");
        }
        function drawBayes(s) {
          const prior = Math.max(0.01, +$("#param").value / 100),
            sensitivity = 0.85,
            falsePositive = 0.12,
            posterior =
              (sensitivity * prior) /
              (sensitivity * prior + falsePositive * (1 - prior));
          $("#below").innerHTML = `<div style="position:absolute;right:10px;bottom:10px;width:47%;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px"><b>Actualización de Bayes</b><div class="hist"><div class="bar" style="height:${prior * 100}%" data-v="Prior ${(prior * 100).toFixed(1)}%"></div><div class="bar" style="height:${posterior * 100}%" data-v="Posterior ${(posterior * 100).toFixed(1)}%"></div></div><small>Prior → evidencia positiva → posterior</small></div>`;
          $("#m4").textContent = (posterior * 100).toFixed(1) + "%";
          $("#l4").textContent = "posterior Bayes";
        }
        function drawMatrix(s) {
          const A = adj(s.g),
            n = Math.min(10, s.g.n);
          let h =
            '<div class="table-wrap" style="position:absolute;right:10px;bottom:10px;max-width:46%;background:var(--panel);padding:8px;border-radius:10px"><table class="matrix">';
          for (let i = 0; i < n; i++) {
            h += "<tr>";
            for (let j = 0; j < n; j++)
              h += `<td class="${A[i].includes(j) ? "on" : ""}">${A[i].includes(j) ? 1 : 0}</td>`;
            h += "</tr>";
          }
          $("#below").innerHTML = h + "</table></div>";
        }
        function drawHist(d) {
          const count = {};
          d.forEach((k) => (count[k] = (count[k] || 0) + 1));
          $("#below").innerHTML =
            `<div style="position:absolute;right:10px;bottom:10px;width:46%;background:var(--panel);border:1px solid var(--line);border-radius:10px"><div class="hist">${Object.entries(
              count,
            )
              .map(
                ([k, v]) =>
                  `<div class="bar" style="height:${(v / Math.max(...Object.values(count))) * 100}%" data-v="k=${k}: ${v}"></div>`,
              )
              .join("")}</div></div>`;
        }
        function shuffled(arr, seed) {
          const a = arr
            .map((x, i) => ({ x, k: (i * 37 + seed * 17) % 97 }))
            .sort((a, b) => a.k - b.k);
          return a.map((o) => o.x);
        }
        function quiz(c) {
          const other = chapters[(c.n + 7) % 48].concepts;
          const qs = [
            {
              q: `¿Cuál es un concepto central del capítulo ${c.n}?`,
              a: c.concepts[0],
              o: [
                c.concepts[0],
                other[0],
                "recursión sintáctica",
                "cifrado simétrico",
              ],
            },
            {
              q: "¿Qué afirmación coincide con la idea esencial?",
              a: c.summary,
              o: [
                c.summary,
                "Toda red real es completa y determinista.",
                "Una sola métrica responde cualquier pregunta.",
                "La visualización reemplaza la validación estadística.",
              ],
            },
            {
              q: `¿Qué expresión se asocia con ${c.title}?`,
              a: c.formula,
              o: [
                c.formula,
                chapters[(c.n + 4) % 48].formula,
                "n!=n+1",
                "Σ=∅ siempre",
              ],
            },
          ];
          $("#body").innerHTML =
            `<form class="card" id="quizForm"><div class="between"><h3>Evaluación del capítulo</h3><span class="tag">Mejor: ${state.quiz[c.n] || 0}/3</span></div>${qs
              .map((q, i) => {
                const opts = shuffled(q.o, c.n + i);
                return `<div class="quiz-q"><b>${i + 1}. ${q.q}</b>${opts.map((o) => `<label class="opt"><input type="radio" name="q${i}" value="${encodeURIComponent(o)}"> ${o}</label>`).join("")}</div>`;
              })
              .join(
                "",
              )}<button class="btn" type="submit">Comprobar</button></form><div id="result"></div>`;
          $("#quizForm").onsubmit = (e) => {
            e.preventDefault();
            let score = 0;
            qs.forEach((q, i) => {
              const z = $(`input[name=q${i}]:checked`);
              if (z && decodeURIComponent(z.value) === q.a) score++;
            });
            $("#result").innerHTML =
              `<div class="feedback"><h3>${score === 3 ? "Dominio excelente" : score === 2 ? "Buen avance" : "Conviene repasar"}</h3><p>${score}/3 respuestas correctas. ${score < 3 ? "Revisa la idea esencial y prueba el laboratorio antes de reintentar." : "Ya puedes continuar al siguiente capítulo."}</p></div>`;
            if (score > (state.quiz[c.n] || 0)) {
              state.quiz[c.n] = score;
              if (score === 3) {
                award("ch" + c.n, 35);
              } else save();
            }
          };
        }
        function progress() {
          $("#crumb").textContent = "Progreso y glosario";
          const done = chapters.filter((c) =>
              state.done.includes("ch" + c.n),
            ).length,
            avg = Object.values(state.quiz).length
              ? (
                  Object.values(state.quiz).reduce((a, b) => a + b, 0) /
                  Object.values(state.quiz).length
                ).toFixed(1)
              : "0.0";
          $("#view").innerHTML =
            `<div class="chapter-head"><div><div class="eyebrow">Panel personal</div><h2>Progreso y glosario</h2><p class="lead">Todo se guarda automáticamente en este navegador.</p></div></div><div class="stats"><div class="stat"><b>${done}/48</b><span>capítulos</span></div><div class="stat"><b>${Math.round((done / 48) * 100)}%</b><span>avance</span></div><div class="stat"><b>${state.xp}</b><span>XP</span></div><div class="stat"><b>${avg}/3</b><span>promedio</span></div><div class="stat"><b>${Object.keys(state.quiz).length}</b><span>evaluaciones</span></div></div><div class="card"><h3>Estado por capítulo</h3><div class="table-wrap"><table><thead><tr><th>Capítulo</th><th>Parte</th><th>Evaluación</th><th>Estado</th><th></th></tr></thead><tbody>${chapters.map((c) => `<tr><td>${c.n}. ${c.title}</td><td>${partOf(c.n)[1]}</td><td>${state.quiz[c.n] || 0}/3</td><td>${state.done.includes("ch" + c.n) ? "✓ Completado" : "Pendiente"}</td><td><button class="btn sec" data-go="${c.n}">Abrir</button></td></tr>`).join("")}</tbody></table></div></div><div class="section-head"><h2>Glosario esencial</h2></div><div class="glossary">${glossary.map(([a, b]) => `<div class="term"><b>${a}</b><span>${b}</span></div>`).join("")}</div><div class="card" style="margin-top:14px"><h3>Gestión de datos</h3><div class="controls"><button class="btn sec" id="export">Exportar progreso</button><button class="btn warn" id="reset">Borrar progreso</button></div></div>`;
          wire();
          $("#export").onclick = () => {
            const blob = new Blob(
                [
                  JSON.stringify(
                    {
                      titulo: "Atlas Interactivo de Ciencia de Redes",
                      fecha: new Date().toISOString(),
                      ...state,
                    },
                    null,
                    2,
                  ),
                ],
                { type: "application/json" },
              ),
              a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "progreso_atlas_redes.json";
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 300);
          };
          $("#reset").onclick = () => $("#resetModal").classList.add("show");
        }
        $("#theme").onclick = () => {
          state.theme = state.theme === "dark" ? "light" : "dark";
          document.documentElement.dataset.theme = state.theme;
          save();
          if ($("#canvas")) drawLab();
        };
        $("#menu").onclick = () => $("#side").classList.toggle("open");
        $("#search").oninput = (e) => {
          const q = e.target.value.toLowerCase();
          $$("#nav button[data-search]").forEach(
            (b) =>
              (b.style.display = b.dataset.search.includes(q)
                ? "grid"
                : "none"),
          );
        };
        $("#resetNo").onclick = () => $("#resetModal").classList.remove("show");
        $("#resetYes").onclick = () => {
          localStorage.removeItem("atlasRedes");
          state = { ...base, done: [], quiz: {} };
          $("#resetModal").classList.remove("show");
          go("home");
          toast("Progreso eliminado");
        };
        document.documentElement.dataset.theme = state.theme;
        buildNav();
        go(state.last || "home");
        updateProgress();
      })();
    </script>
  </body>
</html>
