<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="Libro web interactivo autónomo de Teoría de la Computación, capítulos 1 al 9 de K. R. Chowdhary."
    />
    <title>Libro Interactivo de Teoría de la Computación · Capítulos 1–9</title>
    <style>
      :root {
        --bg: #f3f7fb;
        --panel: #fff;
        --soft: #eef4ff;
        --text: #17233a;
        --muted: #60718b;
        --line: #d7e1ef;
        --blue: #245bd7;
        --violet: #703bc5;
        --green: #0e8a63;
        --orange: #d46b17;
        --red: #c83f52;
        --cyan: #087f9c;
        --yellow: #f2c94c;
        --shadow: 0 10px 28px #1e375816;
        --r: 17px;
      }
      [data-theme="dark"] {
        --bg: #0d1523;
        --panel: #172237;
        --soft: #1d2d47;
        --text: #edf4ff;
        --muted: #adbad0;
        --line: #34465f;
        --blue: #82a2ff;
        --violet: #bd91ff;
        --green: #4ed5a7;
        --orange: #ffad65;
        --red: #ff7f92;
        --cyan: #51d3eb;
        --yellow: #ffdc69;
        --shadow: 0 12px 30px #0006;
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font:
          15px/1.5 Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      .app {
        display: grid;
        grid-template-columns: 278px 1fr;
        min-height: 100vh;
      }
      .side {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 15px 13px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        overflow: auto;
        z-index: 20;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
      }
      .mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 13px;
        background: linear-gradient(135deg, var(--blue), var(--violet));
        color: #fff;
        font-weight: 950;
      }
      .brand strong {
        display: block;
      }
      .brand small {
        color: var(--muted);
      }
      .edition {
        margin: 13px 6px 8px;
        padding: 9px 11px;
        border-radius: 12px;
        background: var(--soft);
        color: var(--blue);
        font-weight: 800;
      }
      .nav {
        display: grid;
        gap: 4px;
      }
      .nav button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 9px;
        border-radius: 10px;
        text-align: left;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .nav button:hover,
      .nav button.on {
        background: var(--soft);
        color: var(--blue);
        font-weight: 800;
      }
      .nav .num {
        min-width: 24px;
        height: 24px;
        border: 1px solid currentColor;
        border-radius: 7px;
        display: grid;
        place-items: center;
        font-size: 11px;
      }
      .nav button.done .num {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .side-progress {
        margin: 15px 6px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 13px;
      }
      .track {
        height: 8px;
        border-radius: 20px;
        background: var(--line);
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--blue), var(--green));
        transition: 0.3s;
      }
      .main {
        min-width: 0;
      }
      .top {
        height: 65px;
        position: sticky;
        top: 0;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 91%, transparent);
        backdrop-filter: blur(12px);
      }
      .crumb {
        color: var(--muted);
      }
      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .xp {
        padding: 7px 11px;
        border-radius: 999px;
        background: #fff2c6;
        color: #715000;
        font-weight: 900;
      }
      .icon {
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--panel);
        color: var(--text);
      }
      .menu {
        display: none;
      }
      .content {
        max-width: 1420px;
        margin: auto;
        padding: 23px;
      }
      .hero {
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: 25px;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--blue) 13%, var(--panel)),
          var(--panel),
          color-mix(in srgb, var(--cyan) 9%, var(--panel))
        );
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .hero:after {
        content: "δ(q,a)";
        position: absolute;
        right: 3%;
        bottom: -35px;
        font-size: 125px;
        font-weight: 950;
        color: color-mix(in srgb, var(--blue) 7%, transparent);
        transform: rotate(-7deg);
      }
      h1,
      h2,
      h3 {
        line-height: 1.18;
        margin-top: 0;
      }
      h1 {
        font-size: clamp(30px, 4.5vw, 50px);
        letter-spacing: -1.6px;
      }
      h2 {
        font-size: clamp(24px, 3vw, 35px);
      }
      h3 {
        font-size: 18px;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.13em;
        color: var(--blue);
        font-size: 12px;
        font-weight: 900;
      }
      .lead {
        font-size: 17px;
        color: var(--muted);
        max-width: 860px;
      }
      .btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: var(--blue);
        color: #fff;
        font-weight: 800;
      }
      .btn.sec {
        background: var(--soft);
        color: var(--blue);
        border: 1px solid var(--line);
      }
      .btn.red {
        background: var(--red);
      }
      .btn:disabled {
        opacity: 0.45;
      }
      .actions,
      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 11px;
        margin: 16px 0;
      }
      .stat,
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--r);
        box-shadow: var(--shadow);
      }
      .stat {
        padding: 16px;
      }
      .stat b {
        font-size: 24px;
        display: block;
      }
      .stat span {
        color: var(--muted);
      }
      .map {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 11px;
      }
      .map-card {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        cursor: pointer;
        transition: 0.2s;
      }
      .map-card:hover {
        transform: translateY(-3px);
        border-color: var(--blue);
      }
      .map-card .number {
        width: 35px;
        height: 35px;
        border-radius: 10px;
        background: var(--blue);
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 900;
      }
      .map-card:nth-child(3n + 2) .number {
        background: var(--violet);
      }
      .map-card:nth-child(3n) .number {
        background: var(--green);
      }
      .map-card p {
        min-height: 42px;
        color: var(--muted);
      }
      .tag {
        display: inline-flex;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
      }
      .chapter-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 15px;
      }
      .tabs {
        display: flex;
        gap: 5px;
        border-bottom: 1px solid var(--line);
        margin: 14px 0;
        overflow: auto;
      }
      .tab {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 10px 13px;
        border-bottom: 3px solid transparent;
        white-space: nowrap;
      }
      .tab.on {
        color: var(--blue);
        border-color: var(--blue);
        font-weight: 850;
      }
      .card {
        padding: 17px;
      }
      .grid2 {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(300px, 0.82fr);
        gap: 14px;
      }
      .grid3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 11px;
      }
      .stack {
        display: grid;
        gap: 13px;
      }
      .lab {
        min-height: 380px;
        position: relative;
        overflow: auto;
      }
      .input-row {
        display: flex;
        align-items: end;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .field {
        display: grid;
        gap: 4px;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 800;
      }
      input,
      select,
      textarea {
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--panel);
        color: var(--text);
        min-width: 115px;
      }
      .formula {
        font:
          700 15px/1.55 ui-monospace,
          SFMono-Regular,
          Consolas,
          monospace;
        padding: 10px;
        border-radius: 10px;
        background: var(--soft);
        color: var(--blue);
        overflow: auto;
      }
      .explain {
        padding: 11px;
        border-left: 4px solid var(--blue);
        border-radius: 9px;
        background: var(--soft);
        color: var(--muted);
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }
      .metric {
        padding: 8px;
        text-align: center;
        border-radius: 10px;
        background: var(--soft);
      }
      .metric b {
        display: block;
        color: var(--blue);
        font-size: 18px;
      }
      .svg {
        width: 100%;
        min-height: 310px;
      }
      .tape {
        display: flex;
        justify-content: center;
        gap: 5px;
        padding: 65px 12px 30px;
        min-width: max-content;
      }
      .cell {
        width: 50px;
        height: 50px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        display: grid;
        place-items: center;
        font:
          800 17px ui-monospace,
          monospace;
        position: relative;
      }
      .cell.active {
        border-color: var(--orange);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--orange) 18%, transparent);
      }
      .cell.active:before {
        content: "▼";
        position: absolute;
        top: -33px;
        color: var(--orange);
      }
      .cell.good {
        border-color: var(--green);
        color: var(--green);
      }
      .cell.bad {
        border-color: var(--red);
        color: var(--red);
      }
      .cell.source {
        border-color: var(--violet);
        color: var(--violet);
      }
      .idx {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
      }
      .stack-viz {
        display: flex;
        flex-direction: column-reverse;
        gap: 5px;
        align-items: center;
        min-height: 270px;
        justify-content: flex-start;
        padding: 15px;
      }
      .stack-cell {
        width: 90px;
        height: 39px;
        border: 2px solid var(--line);
        border-radius: 7px;
        background: var(--soft);
        display: grid;
        place-items: center;
        font-weight: 900;
      }
      .state-pill {
        display: inline-grid;
        place-items: center;
        min-width: 55px;
        height: 40px;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--blue);
        color: #fff;
        font-weight: 900;
      }
      .table-wrap {
        overflow: auto;
      }
      .matrix {
        border-collapse: separate;
        border-spacing: 5px;
        margin: auto;
      }
      .matrix th {
        font-size: 11px;
        color: var(--muted);
      }
      .matrix td {
        min-width: 46px;
        height: 38px;
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--soft);
        font-weight: 800;
        padding: 4px;
      }
      .matrix td.active {
        outline: 3px solid var(--blue);
        color: var(--blue);
      }
      .matrix td.mark {
        outline: 2px solid var(--red);
        color: var(--red);
      }
      .rule-list {
        display: grid;
        gap: 7px;
      }
      .rule {
        padding: 9px 11px;
        border-radius: 9px;
        border: 1px solid var(--line);
        background: var(--soft);
        font:
          700 14px ui-monospace,
          monospace;
      }
      .rule.on {
        border-color: var(--orange);
        background: color-mix(in srgb, var(--orange) 10%, var(--panel));
      }
      .token-row {
        display: flex;
        gap: 5px;
        justify-content: center;
        flex-wrap: wrap;
        padding: 30px 5px;
      }
      .token {
        padding: 8px 11px;
        border-radius: 8px;
        background: var(--soft);
        border: 2px solid var(--line);
        font:
          800 15px ui-monospace,
          monospace;
      }
      .token.active {
        border-color: var(--orange);
        color: var(--orange);
      }
      .token.done {
        border-color: var(--green);
        color: var(--green);
      }
      .partition {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 25px;
      }
      .block {
        padding: 13px;
        border: 2px solid var(--blue);
        border-radius: 12px;
        background: var(--soft);
        font-weight: 900;
        min-width: 90px;
        text-align: center;
      }
      .venn {
        min-height: 330px;
      }
      .details {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        overflow: hidden;
      }
      .details summary {
        padding: 11px 13px;
        font-weight: 850;
        cursor: pointer;
        background: var(--soft);
      }
      .details > div {
        padding: 12px;
      }
      .section-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 7px;
      }
      .section {
        padding: 9px;
        border-radius: 9px;
        background: var(--soft);
      }
      .quiz-q {
        padding: 14px 0;
        border-bottom: 1px solid var(--line);
      }
      .opts {
        display: grid;
        gap: 7px;
        margin: 10px 0;
      }
      .opt {
        display: flex;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        padding: 8px;
        border-radius: 9px;
      }
      .feedback {
        font-weight: 800;
        min-height: 24px;
      }
      .goodtext {
        color: var(--green);
      }
      .badtext {
        color: var(--red);
      }
      .glossary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .term {
        padding: 13px;
        border-left: 4px solid var(--blue);
        border-radius: 11px;
        background: var(--panel);
      }
      .term b {
        display: block;
      }
      .term span {
        color: var(--muted);
      }
      .progress-table {
        width: 100%;
        border-collapse: collapse;
      }
      .progress-table th,
      .progress-table td {
        text-align: left;
        padding: 9px;
        border-bottom: 1px solid var(--line);
      }
      .footer-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 18px;
      }
      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        padding: 11px 15px;
        border-radius: 11px;
        background: #11213a;
        color: #fff;
        opacity: 0;
        transform: translateY(90px);
        transition: 0.25s;
        z-index: 50;
      }
      .toast.show {
        opacity: 1;
        transform: none;
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: #07101cbb;
        z-index: 60;
        place-items: center;
        padding: 20px;
      }
      .modal.show {
        display: grid;
      }
      .modal-box {
        max-width: 520px;
        background: var(--panel);
        padding: 22px;
        border-radius: 18px;
      }
      .arrow {
        color: var(--orange);
        font-weight: 950;
        font-size: 22px;
      }
      .tree-note {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
      @media (max-width: 1080px) {
        .grid2 {
          grid-template-columns: 1fr;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
        .glossary {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 760px) {
        .app {
          grid-template-columns: 1fr;
        }
        .side {
          position: fixed;
          left: -290px;
          width: 278px;
          transition: 0.25s;
          box-shadow: var(--shadow);
        }
        .side.open {
          left: 0;
        }
        .menu {
          display: inline-grid;
          place-items: center;
        }
        .content {
          padding: 14px;
        }
        .top {
          padding: 0 13px;
        }
        .map,
        .grid3,
        .glossary {
          grid-template-columns: 1fr;
        }
        .hero {
          padding: 23px;
        }
        .chapter-head {
          display: block;
        }
        .section-list {
          grid-template-columns: 1fr;
        }
        .lab {
          min-height: 320px;
        }
        .crumb {
          font-size: 12px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side" id="side">
        <div class="brand">
          <div class="mark">TC</div>
          <div>
            <strong>CompuTeoría</strong><small>Autómatas y lenguajes</small>
          </div>
        </div>
        <div class="edition">Capítulos 1–9 · Edición interactiva</div>
        <nav class="nav" id="nav">
          <button class="on" data-page="home">
            <span class="num">⌂</span>Inicio
          </button>
        </nav>
        <div class="side-progress">
          <b>Progreso global</b>
          <div class="track" style="margin: 8px 0">
            <div class="fill" id="progressFill"></div>
          </div>
          <small id="progressText">0% completado</small>
        </div>
      </aside>
      <main class="main">
        <header class="top">
          <div style="display: flex; align-items: center; gap: 8px">
            <button class="icon menu" id="menuBtn" aria-label="Abrir menú">
              ☰
            </button>
            <div class="crumb">
              Libro interactivo / <b id="crumb">Inicio</b>
            </div>
          </div>
          <div class="top-actions">
            <span class="xp">★ <span id="xp">0</span> XP</span
            ><button class="icon" id="themeBtn" aria-label="Cambiar tema">
              ◐
            </button>
          </div>
        </header>
        <div class="content"><div id="view"></div></div>
      </main>
    </div>
    <div class="toast" id="toast" role="status"></div>
    <div class="modal" id="resetModal">
      <div class="modal-box">
        <h3>¿Borrar todo el progreso?</h3>
        <p>Se eliminarán laboratorios, evaluaciones y XP.</p>
        <div class="controls">
          <button class="btn red" id="resetYes">Borrar</button
          ><button class="btn sec" id="resetNo">Cancelar</button>
        </div>
      </div>
    </div>
    <script>
      (() => {
        "use strict";
        const $ = (s, r = document) => r.querySelector(s),
          $$ = (s, r = document) => [...r.querySelectorAll(s)];
        const chapters = [
          {
            n: 1,
            title: "Preliminares matemáticos",
            short:
              "Conjuntos, pruebas, relaciones, funciones, grafos, cadenas y lenguajes",
            level: "Fundamentos",
            sections: [
              "1.1 Introducción",
              "1.2 Teoría de conjuntos",
              "1.3 Teoremas y pruebas",
              "1.4 Paradoja de Russell y diagonalización",
              "1.5 Relaciones",
              "1.6 Funciones",
              "1.7 Teoría de grafos",
              "1.8 Teoría algebraica de máquinas",
              "1.9 Operaciones sobre cadenas",
              "1.10 Cadenas y lenguajes",
              "1.11 Clausura",
              "1.12 Representación de lenguajes",
            ],
            idea: "Los modelos de computación se formulan con conjuntos, funciones, relaciones y operaciones sobre cadenas.",
            pre: "Álgebra elemental y razonamiento lógico.",
            obj: [
              "Operar conjuntos y lenguajes",
              "Distinguir relaciones y funciones",
              "Manipular cadenas y clausuras",
            ],
            terms:
              "conjuntos, pruebas, relaciones, funciones, grafos, semigrupos, homomorfismos, cadenas y lenguajes",
            lab: "math",
            errors: [
              "Confundir ∅ con {ε}",
              "Tratar concatenación como conmutativa",

        const dfaPresets = {
            ends01: {

        function graphFA(m, active, sets = []) {
          const pos =
            m.names.length === 2
              ? [
                  [210, 170],
                  [510, 170],
                ]
              : dfaPos;
          let h =
            '<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="var(--muted)"/></marker></defs>';
          for (let i = 0; i < m.names.length; i++)
            for (let s = 0; s < m.alpha.length; s++) {
              const j = m.delta[i][s];
              if (j == null) continue;
              const [x1, y1] = pos[i],
                [x2, y2] = pos[j];
              if (i === j) {
                h += `<path d="M${x1 - 18},${y1 - 27} C${x1 - 75},${y1 - 100} ${x1 + 75},${y1 - 100} ${x1 + 18},${y1 - 27}" fill="none" stroke="var(--muted)" stroke-width="2" marker-end="url(#arr)"/><text x="${x1}" y="${y1 - 78}" text-anchor="middle" fill="var(--text)">${m.alpha[s]}</text>`;
              } else {
                const dx = x2 - x1,
                  dy = y2 - y1,
                  L = Math.hypot(dx, dy),
                  ux = dx / L,
                  uy = dy / L;
                h += `<line x1="${x1 + ux * 30}" y1="${y1 + uy * 30}" x2="${x2 - ux * 34}" y2="${y2 - uy * 34}" stroke="var(--muted)" stroke-width="2" marker-end="url(#arr)"/><text x="${(x1 + x2) / 2}" y="${(y1 + y2) / 2 - 8}" fill="var(--text)" font-weight="800">${m.alpha[s]}</text>`;
              }
            }
          pos.forEach(([x, y], i) => {
            const on = Array.isArray(active)
              ? active.includes(i)
              : i === active;
            h += `<circle cx="${x}" cy="${y}" r="29" fill="${on ? "var(--orange)" : "var(--blue)"}" stroke="var(--panel)" stroke-width="4"/>${m.final.includes(i) ? `<circle cx="${x}" cy="${y}" r="23" fill="none" stroke="white" stroke-width="2"/>` : ""}<text x="${x}" y="${y + 5}" text-anchor="middle" fill="white" font-weight="900">${m.names[i]}</text>`;
          });
          return h;
        }
        function labDFA() {
          shell(
            '<div class="field"><label>Lenguaje</label><select id="preset"><option value="ends01">Termina en 01</option><option value="even1">Número par de 1</option></select></div><div class="field"><label>Cadena</label><input id="word" value="1101"></div><button class="btn" id="build">Cargar</button>',
            `<div class="card"><h3>Configuración</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>símbolos</div><div class="metric"><b id="state">q0</b>estado</div><div class="metric"><b id="status">—</b>resultado</div></div></div><div class="card"><h3>Definición</h3><div class="formula">M=(Q,Σ,δ,q₀,F)</div><p>La transición extendida δ* aplica δ a toda la cadena.</p></div>`,
          );
          let m,
            word,
            states = [],
            i = 0;
          function build() {
            m = dfaPresets[$("#preset").value];
            word = $("#word").value.replace(/[^01]/g, "");
            states = [m.start];

            draw();
          }
          function draw() {
            $("#viz").innerHTML =
              `<svg class="svg" viewBox="0 0 720 330">${graphFA(m, states[i])}</svg><div class="token-row">${[...word].map((x, k) => `<span class="token ${k < i ? "done" : k === i ? "active" : ""}">${x}</span>`).join("") || '<span class="token">ε</span>'}</div>`;
            $("#formula").textContent = i
              ? `δ(${m.names[states[i - 1]]}, ${word[i - 1]}) = ${m.names[states[i]]}`
              : `Inicio en ${m.names[m.start]}`;
            $("#state").textContent = m.names[states[i]];
            $("#step").textContent = i;
            const end = i === word.length,
              ok = end && m.final.includes(states[i]);
            $("#status").textContent = end ? (ok ? "ACEPTA" : "RECHAZA") : "—";
            $("#explain").textContent = end
              ? ok
                ? `La cadena pertenece al lenguaje: ${m.title}.`
                : "La entrada terminó fuera de un estado final."
              : "El cabezal conceptual consume exactamente un símbolo por transición.";
            if (end) award("lab2");
          }
          function next() {
            if (i >= word.length) return false;
            i++;
            draw();
            return true;
          }
          function prev() {
            i = Math.max(0, i - 1);
            draw();
          }
          $("#build").onclick = build;
          $("#preset").onchange = build;
          ctl(prev, next, () => {
            i = 0;
            draw();

        function labNFA() {
          shell(
            '<div class="field"><label>Modo</label><select id="mode"><option value="nfa">NFA: contiene ab</option><option value="mealy">Mealy: paridad acumulada</option></select></div><div class="field"><label>Cadena</label><input id="word" value="aabab"></div><button class="btn" id="build">Preparar</button>',
            `<div class="card"><h3>Estado/conjunto actual</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>posición</div><div class="metric"><b id="states">{q0}</b>activos</div><div class="metric"><b id="output">—</b>salida</div></div></div><div class="card"><h3>Equivalencia</h3><p>En subset construction, cada conjunto alcanzable de estados NFA se convierte en un estado DFA.</p></div>`,
          );
          let mode,
            word,
            steps = [],
            i = 0;
          function build() {
            mode = $("#mode").value;
            word = $("#word").value.replace(/[^ab01]/g, "");
            steps = [];
            if (mode === "nfa") {
              word = word.replace(/[^ab]/g, "");
              let S = [0];
              steps = [{ S: [0] }];
              for (const ch of word) {
                let N = [];
                for (const q of S) {
                  if (q === 0) {
                    N.push(0);
                    if (ch === "a") N.push(1);
                  }
                  if (q === 1 && ch === "b") N.push(2);
                  if (q === 2) N.push(2);
                }
                S = [...new Set(N)];
                steps.push({ S: [...S], ch });
              }
            } else {
              word = word.replace(/[^01]/g, "");
              let q = 0,
                out = "";
              steps = [{ S: [0], out }];
              for (const ch of word) {
                q = (q + Number(ch)) % 2;
                out += String(q);
                steps.push({ S: [q], ch, out });
              }
            }
            i = 0;
            draw();
          }
          function draw() {
            const z = steps[i],
              model = {
                names: mode === "nfa" ? ["q0", "q1", "q2"] : ["par", "impar"],
                start: 0,
                final: mode === "nfa" ? [2] : [0],
                alpha: mode === "nfa" ? ["a", "b"] : ["0", "1"],
                delta:
                  mode === "nfa"
                    ? [
                        [0, 0],
                        [null, 2],
                        [2, 2],
                      ]
                    : [
                        [0, 1],
                        [1, 0],
                      ],
              };
            $("#viz").innerHTML =
              `<svg class="svg" viewBox="0 0 720 330">${graphFA(model, z.S)}</svg><div class="token-row">${[...word].map((x, k) => `<span class="token ${k < i ? "done" : k === i ? "active" : ""}">${x}</span>`).join("")}</div>`;
            $("#formula").textContent = i
              ? `${mode === "nfa" ? "Δ" : "δ"}(${JSON.stringify(steps[i - 1].S)}, ${z.ch}) = {${z.S.map((q) => model.names[q]).join(",")}}`
              : "Configuración inicial";
            $("#explain").textContent =
              mode === "nfa"
                ? "Todas las ramas posibles permanecen activas; basta una rama final para aceptar."
                : "La salida Mealy se produce en cada transición.";
            $("#step").textContent = i;
            $("#states").textContent =
              "{" + z.S.map((q) => model.names[q]).join(",") + "}";
            $("#output").textContent =
              mode === "mealy"
                ? z.out || "ε"
                : i === word.length
                  ? z.S.includes(2)
                    ? "ACEPTA"
                    : "RECHAZA"
                  : "—";
            if (i === word.length) award("lab3");
          }
          function next() {
            if (i >= word.length) return false;
            i++;
            draw();
            return true;
          }
          function prev() {
            i = Math.max(0, i - 1);
            draw();
          }
          $("#build").onclick = build;
          $("#mode").onchange = build;
          ctl(prev, next, () => {
            i = 0;
            draw();
          });
          build();
        }

        function labMin() {
          shell(
            '<div class="field"><label>Método</label><select id="method"><option value="partition">Partition-refine</option><option value="table">Table filling</option></select></div><button class="btn" id="build">Preparar DFA</button>',
            `<div class="card"><h3>Refinamiento</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>ronda</div><div class="metric"><b id="blocks">2</b>bloques</div><div class="metric"><b id="minstates">—</b>estados mínimos</div></div></div><div class="card"><h3>DFA de ejemplo</h3><p>Estados A–F, finales C,D,E. Los estados equivalentes terminan en el mismo bloque estable.</p></div>`,
          );
          const names = "ABCDEF".split(""),
            final = new Set([2, 3, 4]),
            D = [
              [1, 2],
              [0, 3],
              [4, 2],
              [4, 3],
              [4, 2],
              [5, 5],
            ];
          let parts = [],
            i = 0;
          function refine(P) {
            const sig = (q) =>
              D[q].map((t) => P.findIndex((b) => b.includes(t))).join(",");
            return P.flatMap((B) =>
              Object.values(
                Object.groupBy
                  ? Object.groupBy(B, sig)
                  : B.reduce((o, x) => ((o[sig(x)] ??= []).push(x), o), {}),
              ),
            );
          }
          function build() {
            parts = [
              [
                [0, 1, 5],
                [2, 3, 4],
              ],
            ];
            for (let k = 0; k < 6; k++) {
              const N = refine(parts.at(-1));
              if (JSON.stringify(N) === JSON.stringify(parts.at(-1))) break;
              parts.push(N);
            }
            i = 0;
            draw();
          }
          function draw() {
            const P = parts[i];
            if ($("#method").value === "partition")
              $("#viz").innerHTML =
                `<div class="partition">${P.map((b, k) => `<div class="block">P${k}={${b.map((x) => names[x]).join(",")}}</div>`).join("")}</div><div class="tree-note">Cada ronda separa estados cuyas transiciones llegan a bloques diferentes.</div>`;
            else {
              let h =
                '<table class="matrix"><tr><th></th>' +
                names.map((x) => `<th>${x}</th>`).join("") +
                "</tr>";
              for (let r = 0; r < 6; r++) {
                h += `<tr><th>${names[r]}</th>`;
                for (let c = 0; c < 6; c++) {
                  const same = P.some((b) => b.includes(r) && b.includes(c));
                  h += `<td class="${r > c && !same ? "mark" : ""}">${r > c ? (same ? "≈" : "×") : ""}</td>`;
                }
                h += "</tr>";
              }
              $("#viz").innerHTML =
                '<div class="table-wrap">' + h + "</table></div>";
            }
            $("#formula").textContent =
              `P${i} = ${P.map((b) => "{" + b.map((x) => names[x]).join(",") + "}").join(" ")}`;
            $("#explain").textContent =
              i === parts.length - 1
                ? "La partición ya es estable: cada bloque representa un estado del DFA mínimo."
                : "Comparamos destinos bajo 0 y 1 para dividir bloques.";
            $("#step").textContent = i;
            $("#blocks").textContent = P.length;
            $("#minstates").textContent =
              i === parts.length - 1 ? P.length : "—";
            if (i === parts.length - 1) award("lab4");
          }
          function next() {
            if (i >= parts.length - 1) return false;
            i++;
            draw();
            return true;
          }
          function prev() {
            i = Math.max(0, i - 1);
            draw();
          }
          $("#build").onclick = build;
          $("#method").onchange = draw;
          ctl(prev, next, () => {
            i = 0;
            draw();
          });
          build();
        }

        function labPump() {
          shell(
            '<div class="field"><label>Lenguaje</label><select id="lang"><option value="anbn">L={aⁿbⁿ}</option><option value="regular">L=a*b*</option></select></div><div class="field"><label>Longitud p</label><input id="p" type="number" min="2" max="8" value="4"></div><div class="field"><label>Bombear i</label><select id="pow"><option>0</option><option>2</option><option>3</option></select></div><button class="btn" id="play">Jugar</button>',
            `<div class="card"><h3>Juego de cuantificadores</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="plen">4</b>p</div><div class="metric"><b id="split">—</b>y</div><div class="metric"><b id="result">—</b>resultado</div></div></div><div class="card"><h3>Condiciones</h3><div class="rule-list"><div class="rule">w=xyz</div><div class="rule">|xy|≤p</div><div class="rule">|y|&gt;0</div><div class="rule">xyⁱz∈L para todo i≥0</div></div></div>`,
          );
          function play() {
            const p = Math.max(2, Math.min(8, +$("#p").value)),
              non = $("#lang").value === "anbn",
              w = non
                ? "a".repeat(p) + "b".repeat(p)
                : "a".repeat(p) + "b".repeat(p),

        function labPDA() {
          shell(
            '<div class="field"><label>Modo</label><select id="mode"><option value="pda">PDA para aⁿbⁿ</option><option value="ll">Parser LL(1)</option></select></div><div class="field"><label>Entrada</label><input id="word" value="aaabbb"></div><button class="btn" id="build">Preparar</button>',
            `<div class="card"><h3>Configuración</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>paso</div><div class="metric"><b id="stackTop">Z₀</b>cima</div><div class="metric"><b id="status">—</b>resultado</div></div></div><div class="card"><h3>Notación PDA</h3><div class="formula">(q, entrada, pila) ⊢ (q′, resto, pila′)</div><p>Una transición puede leer entrada, consultar la cima y reemplazarla.</p></div>`,
          );
          let steps = [],
            i = 0,
            mode;
          function build() {
            mode = $("#mode").value;
            steps = [];
            if (mode === "pda") {
              let w = $("#word").value.replace(/[^ab]/g, ""),
                stack = ["Z₀"],
                state = "qpush",
                pos = 0;
              steps = [{ w, pos, stack: [...stack], state, msg: "Inicio" }];
              while (pos < w.length) {
                const ch = w[pos];
                if (state === "qpush" && ch === "a") {
                  stack.push("A");
                  pos++;
                  steps.push({
                    w,
                    pos,
                    stack: [...stack],
                    state,
                    msg: "Leer a y apilar A",
                  });
                } else if (ch === "b" && stack.at(-1) === "A") {
                  state = "qpop";
                  stack.pop();
                  pos++;
                  steps.push({
                    w,
                    pos,
                    stack: [...stack],
                    state,
                    msg: "Leer b y desapilar A",
                  });
                } else {
                  steps.push({
                    w,
                    pos,
                    stack: [...stack],
                    state: "qreject",
                    msg: "No existe transición válida",
                    reject: true,
                  });
                  break;
                }
              }
              if (pos === w.length && !steps.at(-1).reject)
                steps.push({
                  w,
                  pos,
                  stack: [...stack],
                  state: stack.length === 1 ? "qaccept" : "qreject",
                  msg:
                    stack.length === 1
                      ? "Entrada consumida y pila base"
                      : "Sobran símbolos en pila",
                  accept: stack.length === 1,
                });
            } else {
              const w = ["id", "+", "id", "$"],
                stack = ["$", "E"],
                table = {
                  E: { id: ["T", "E′"] },
                  T: { id: ["id"] },
                  "E′": { "+": ["+", "T", "E′"], $: [] },
                };
              let pos = 0;
              steps = [{ w, pos, stack: [...stack], msg: "Inicio" }];
              let guard = 0;
              while (stack.length && guard++ < 30) {
                const top = stack.at(-1),
                  look = w[pos];
                if (top === look) {
                  stack.pop();
                  pos++;
                  steps.push({
                    w,
                    pos,
                    stack: [...stack],
                    msg: `Emparejar ${look}`,
                  });
                } else if (table[top] && table[top][look] != null) {
                  stack.pop();
                  const rhs = table[top][look];
                  for (let k = rhs.length - 1; k >= 0; k--) stack.push(rhs[k]);
                  steps.push({
                    w,
                    pos,
                    stack: [...stack],
                    msg: `${top} → ${rhs.join(" ") || "ε"}`,
                  });
                } else {
                  steps.push({
                    w,
                    pos,
                    stack: [...stack],
                    msg: "Error de parsing",
                    reject: true,
                  });
                  break;
                }
              }
              if (!stack.length && pos === w.length)
                steps.push({ w, pos, stack: [], msg: "Aceptar", accept: true });
            }
            i = 0;
            draw();
          }
          function draw() {
            const z = steps[i],
              w = z.w;
            $("#viz").innerHTML =
              `<div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px"><div><div class="token-row">${[...w].map((x, k) => `<span class="token ${k < z.pos ? "done" : k === z.pos ? "active" : ""}">${x}</span>`).join("")}</div><div style="text-align:center"><span class="state-pill">${z.state || "parser"}</span></div></div><div><h3 style="text-align:center">Pila</h3><div class="stack-viz">${z.stack.map((x) => `<div class="stack-cell">${x}</div>`).join("") || "<span>vacía</span>"}</div></div></div>`;

                ? "Las a guardan marcas; cada b debe retirar exactamente una marca."

            $("#stackTop").textContent = z.stack.at(-1) || "∅";

              ? "ACEPTA"
              : z.reject || z.state === "qreject"
                ? "RECHAZA"
                : "—";

          }

            if (i >= steps.length - 1) return false;
            i++;
            draw();
            return true;
          }
          function prev() {
            i = Math.max(0, i - 1);
            draw();
          }
          $("#build").onclick = build;
          $("#mode").onchange = build;
          ctl(prev, next, () => {
            i = 0;
            draw();
          });
          build();
        }

        function labTM() {
          shell(

          );
          let steps = [],
            i = 0;
          function build() {
            const mode = $("#mode").value,
              input =
                $("#word").value.replace(
                  mode === "binary" ? /[^01]/g : /[^1]/g,
                  "",
                ) || "0",
              t = ["□", "□", ...input, "□", "□"];
            let head = 2,
              q = "qscan",
              guard = 0;
            steps = [{ t: [...t], head, q, msg: "Inicio" }];
            while (guard++ < 50 && q !== "qaccept") {
              const read = t[head];
              if (q === "qscan") {
                if (read === "0" || read === "1") {
                  head++;
                  steps.push({
                    t: [...t],
                    head,
                    q,
                    msg: `Leer ${read}; mover R`,
                  });
                } else {
                  q = mode === "unary" ? "qwrite" : "qcarry";
                  head--;
                  steps.push({
                    t: [...t],
                    head,
                    q,
                    msg: "Fin de entrada; preparar incremento",
                  });
                }
              } else if (q === "qwrite") {
                head++;
                t[head] = "1";
                q = "qaccept";
                steps.push({ t: [...t], head, q, msg: "Escribir 1 y aceptar" });
              } else if (q === "qcarry") {
                if (t[head] === "1") {
                  t[head] = "0";
                  head--;
                  steps.push({
                    t: [...t],
                    head,
                    q,
                    msg: "1→0; propagar acarreo a L",
                  });
                } else if (t[head] === "0") {
                  t[head] = "1";
                  q = "qaccept";
                  steps.push({ t: [...t], head, q, msg: "0→1; aceptar" });
                } else {
                  t[head] = "1";
                  q = "qaccept";
                  steps.push({ t: [...t], head, q, msg: "Blanco→1; aceptar" });
                }
              }
            }
            i = 0;
            draw();
          }

            $("#explain").textContent =

                : "La configuración combina contenido de cinta, posición del cabezal y estado.";
            $("#step").textContent = i;
            $("#state").textContent = z.q;
            $("#status").textContent =
              z.q === "qaccept" ? "HALT/ACEPTA" : "EJECUTANDO";
            if (z.q === "qaccept") award("lab9");
          }
          function next() {
            if (i >= steps.length - 1) return false;
            i++;
            draw();
            return true;
          }
          function prev() {
            i = Math.max(0, i - 1);
            draw();
          }
          $("#build").onclick = build;
          $("#mode").onchange = build;
          ctl(prev, next, () => {
            i = 0;
            draw();
          });
          build();
        }

            passed = chapters.filter((c) => (state.quiz[c.n] || 0) >= 4).length;
          $("#view").innerHTML =
            `<div class="chapter-head"><div><div class="eyebrow">Resumen global</div><h2>Glosario y progreso</h2></div></div><div class="stats"><div class="stat"><b>${labs}/9</b><span>laboratorios</span></div><div class="stat"><b>${passed}/9</b><span>evaluaciones</span></div><div class="stat"><b>${state.xp}</b><span>XP</span></div><div class="stat"><b>${Math.round((100 * (labs + passed)) / 18)}%</b><span>progreso</span></div></div><div class="card"><h3>Estado por capítulo</h3><div class="table-wrap"><table class="progress-table"><thead><tr><th>Capítulo</th><th>Laboratorio</th><th>Evaluación</th><th></th></tr></thead><tbody>${chapters.map((c) => `<tr><td>${c.n}. ${c.title}</td><td>${state.completed.includes("lab" + c.n) ? "✓" : "—"}</td><td>${state.quiz[c.n] || 0}/5</td><td><button class="btn sec" data-go="${c.n}">Abrir</button></td></tr>`).join("")}</tbody></table></div></div><h2 style="margin-top:22px">Glosario esencial</h2><div class="glossary">${glossary.map(([a, b]) => `<div class="term"><b>${a}</b><span>${b}</span></div>`).join("")}</div><div class="card" style="margin-top:15px"><h3>Gestión del progreso</h3><div class="controls"><button class="btn sec" id="export">Exportar JSON</button><button class="btn red" id="reset">Borrar progreso</button></div></div>`;
          wireGo();
          $("#export").onclick = () => {
            const blob = new Blob(
                [
                  JSON.stringify(
                    {
                      titulo:
                        "Libro Interactivo de Teoría de la Computación · capítulos 1–9",
                      fecha: new Date().toISOString(),
                      ...state,
                    },
                    null,
                    2,
                  ),
                ],
                { type: "application/json" },
              ),
              a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "progreso_teoria_computacion.json";
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 500);
          };
          $("#reset").onclick = () => $("#resetModal").classList.add("show");
        }
        $("#themeBtn").onclick = () => {
          state.theme = state.theme === "dark" ? "light" : "dark";
          document.documentElement.dataset.theme = state.theme;
          save();
        };
        $("#menuBtn").onclick = () => $("#side").classList.toggle("open");
        $("#resetNo").onclick = () => $("#resetModal").classList.remove("show");
        $("#resetYes").onclick = () => {
          localStorage.removeItem("teoriaCompLibro");
          state = { ...base, completed: [], quiz: {} };
          $("#resetModal").classList.remove("show");
          go("home");
          toast("Progreso eliminado");
        };
        document.documentElement.dataset.theme = state.theme;
        buildNav();
        go(state.last || "home");
        updateProgress();
      })();
    </script>
  </body>
</html>
