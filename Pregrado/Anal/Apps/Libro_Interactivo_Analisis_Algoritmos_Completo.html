ard:nth-child(3n+2) .num{background:var(--purple)}.map-card:nth-child(3n) .num{background:var(--green)}.map-card p{color:var(--muted);min-height:43px}.tag{display:inline-flex;padding:4px 8px;border-radius:999px;background:var(--panel2);color:var(--brand);font-size:12px;font-weight:800}.chapter-head{display:flex;justify-content:space-between;gap:16px;align-items:start}.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin:15px 0;overflow:auto}.tab{border:0;background:transparent;color:var(--muted);padding:10px 13px;border-bottom:3px solid transparent;white-space:nowrap}.tab.on{color:var(--brand);border-color:var(--brand);font-weight:850}.card{padding:18px}.grid2{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(300px,.8fr);gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stack{display:grid;gap:14px}.lab{min-height:380px;overflow:auto;position:relative}.formula{font:700 15px/1.6 ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--brand);background:var(--panel2);padding:10px;border-radius:10px;overflow:auto}.explain{border-left:4px solid var(--brand);padding:11px;background:var(--panel2);color:var(--muted);border-radius:9px}.pseudo{counter-reset:l;background:#101827;color:#e4edff;border-radius:12px;padding:8px 0;overflow:auto;font:13px/1.75 ui-monospace,Consolas,monospace}.pseudo span{display:block;padding:0 12px;white-space:pre}.pseudo span:before{counter-increment:l;content:counter(l);display:inline-block;width:25px;color:#74849f}.pseudo span.on{background:#294d7f;border-left:3px solid var(--yellow);color:#fff}.input-row{display:flex;align-items:end;gap:8px;flex-wrap:wrap;margin-bottom:12px}.field{display:grid;gap:4px}.field label{font-size:12px;color:var(--muted);font-weight:800}input,select{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:9px 10px;border-radius:9px;min-width:115px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.metric{padding:9px;text-align:center;border-radius:10px;background:var(--panel2)}.metric b{display:block;color:var(--brand);font-size:18px}.svg{width:100%;min-height:300px}.array{display:flex;gap:7px;align-items:end;justify-content:center;min-width:max-content;padding:45px 10px}.box{width:49px;height:47px;border:2px solid var(--line);border-radius:9px;display:grid;place-items:center;background:var(--panel2);font-weight:900;position:relative}.box.active{border-color:var(--brand);box-shadow:0 0 0 4px color-mix(in srgb,var(--brand) 18%,transparent)}.box.good{border-color:var(--green);color:var(--green)}.box.bad{border-color:var(--red);color:var(--red)}.box.source{border-color:var(--orange);color:var(--orange)}.idx{text-align:center;font-size:11px;color:var(--muted)}.table-wrap{overflow:auto}.matrix{border-collapse:separate;border-spacing:5px;margin:auto}.matrix th{font-size:11px;color:var(--muted)}.matrix td{width:46px;height:38px;text-align:center;border:1px solid var(--line);background:var(--panel2);border-radius:7px;font-weight:800}.matrix td.active{outline:3px solid var(--brand);color:var(--brand)}.matrix td.source{outline:2px solid var(--orange)}.bars{display:flex;gap:6px;align-items:end;justify-content:center;height:260px;padding:15px}.bar{width:34px;background:linear-gradient(var(--brand),var(--purple));border-radius:7px 7px 2px 2px;position:relative;transition:.25s}.bar span{position:absolute;top:-24px;width:100%;text-align:center;font-weight:800}.bar.active{background:var(--orange)}.bar.done{background:var(--green)}.legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px}.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px}.section-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.section-item{padding:10px;border-radius:10px;background:var(--panel2)}.quiz-q{padding:14px 0;border-bottom:1px solid var(--line)}.opts{display:grid;gap:7px;margin:10px 0}.opt{display:flex;gap:8px;align-items:center;border:1px solid var(--line);padding:8px;border-radius:9px}.feedback{min-height:25px;font-weight:750}.goodtext{color:var(--green)}.badtext{color:var(--red)}.glossary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.term{padding:13px;border-left:4px solid var(--brand);background:var(--panel);border-radius:11px}.term b{display:block}.term span{color:var(--muted)}.complexity{width:100%;border-collapse:collapse}.complexity th,.complexity td{padding:9px;border-bottom:1px solid var(--line);text-align:left}.footer-nav{display:flex;justify-content:space-between;margin-top:18px}.toast{position:fixed;right:20px;bottom:20px;background:#11213b;color:#fff;padding:11px 15px;border-radius:11px;transform:translateY(100px);opacity:0;transition:.25s;z-index:50}.toast.show{transform:none;opacity:1}.home-only{display:block}.chapter-only{display:none}.modal{display:none;position:fixed;inset:0;background:#08101dbb;z-index:60;place-items:center;padding:20px}.modal.show{display:grid}.modal-box{max-width:540px;background:var(--panel);padding:22px;border-radius:18px}.mini-grid{display:grid;grid-template-columns:repeat(4,55px);gap:5px;justify-content:center}.cellq{width:55px;height:55px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--line);font-size:25px}.cellq.queen{background:var(--brand);color:white}.cellq.conflict{background:var(--red);color:white}

(()=>{'use strict';

{n:1,title:'Introducción',short:'Algoritmos y resolución de problemas',level:'Inicial',secs:['1.1 ¿Qué es un algoritmo?','1.2 Resolución algorítmica','1.3 Tipos de problemas','1.4 Estructuras de datos'],idea:'Un mismo problema puede admitir algoritmos basados en ideas muy diferentes y con eficiencias radicalmente distintas.',pre:'Programación elemental y aritmética.',obj:['Distinguir problema, instancia y algoritmo','Reconocer propiedades esenciales','Comparar soluciones para un mismo problema'],alg:'Euclides, comprobación consecutiva y método escolar para el MCD',lab:'gcd',complex:'Euclides: O(log min(m,n)) divisiones',errors:['Confundir algoritmo con programa','No precisar entradas válidas','Omitir terminación o corrección'],quiz:[['Un algoritmo debe terminar para…',['toda entrada legítima','solo el ejemplo','solo entradas pequeñas','ninguna entrada'],0],['Dos algoritmos para el mismo problema…',['siempre son iguales','pueden diferir en eficiencia','deben usar la misma estructura','no pueden compararse'],1],['Una instancia es…',['un lenguaje','un caso concreto del problema','un procesador','una demostración'],1],['La corrección prueba que…',['es rápido','produce la salida requerida','usa poca memoria','tiene bucles'],1],['El MCD de 60 y 24 es…',['6','12','24','36'],1]]},

let state;const base={xp:0,completed:[],quiz:{},last:'home',theme:'light'};try{state={...base,...JSON.parse(localStorage.getItem('algoLibroCompleto')||'{}')}}catch(e){state={...base}};

function navBuild(){const nav=$('#nav');chapters.forEach(c=>nav.insertAdjacentHTML('beforeend',`<button data-page="${c.n}"><span class="n">${c.n}</span>${c.title}</button>`));nav.insertAdjacentHTML('beforeend','<button data-page="glossary"><span class="n">G</span>Glosario y progreso</button>');$$('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.page))}

function updateProgress(){const labs=chapters.filter(c=>state.completed.includes('lab'+c.n)).length,passed=chapters.filter(c=>(state.quiz[c.n]||0)>=4).length,pct=Math.round(100*(labs+passed)/24);$('#progressFill').style.width=pct+'%';$('#progressText').textContent=`${pct}% · ${labs}/12 laboratorios · ${passed}/12 evaluaciones`;$('#xp').textContent=state.xp;$$('#nav button[data-page]').forEach(b=>{const n=Number(b.dataset.page);b.classList.toggle('done',n&&state.completed.includes('lab'+n)&&(state.quiz[n]||0)>=4)})}
function renderHome(){$('#crumb').textContent='Inicio';$('#view').innerHTML=`<div class="hero"><div class="eyebrow">Basado en la organización temática de Levitin · 3.ª edición</div><h1>Libro Interactivo de<br>Análisis de Algoritmos</h1><p class="lead">Doce capítulos para experimentar, predecir, ejecutar y comparar algoritmos. Todo funciona localmente, sin servidor ni conexión.</p><div class="actions"><button class="btn" data-go="${state.last==='home'?1:state.last}">Comenzar o continuar</button><button class="btn sec" data-go="glossary">Ver mi progreso</button></div></div><div class="stats"><div class="stat"><b>12</b><span>capítulos completos</span></div><div class="stat"><b>16</b><span>modos de laboratorio</span></div><div class="stat"><b>60</b><span>preguntas de evaluación</span></div><div class="stat"><b>${state.xp}</b><span>XP acumulados</span></div></div><div class="chapter-head"><div><div class="eyebrow">Mapa del libro</div><h2>Una ruta por las grandes técnicas</h2></div></div><div class="map">${chapters.map(c=>`<article class="map-card" data-go="${c.n}"><div class="num">${c.n}</div><h3>${c.title}</h3><p>${c.short}</p><span class="tag">${c.level}</span></article>`).join('')}</div>`;wireGo()}

const setPseudo=(id,n)=>$$(`#${id} span`).forEach((x,i)=>x.classList.toggle('on',i===n));const parse=(s,min=0,max=999)=>s.split(',').map(Number).filter(x=>Number.isFinite(x)&&x>=min&&x<=max).slice(0,14);
function stopAuto(){if(sim.timer){clearInterval(sim.timer);sim.timer=null}}
function ctl(prev,next,reset,done){$('#controls').innerHTML='<button class="btn sec" id="prev">← Anterior</button><button class="btn" id="next">Siguiente →</button><button class="btn sec" id="auto">▶ Automático</button><button class="btn sec" id="reset">↺ Reiniciar</button>';$('#prev').onclick=prev;$('#next').onclick=next;$('#reset').onclick=reset;$('#auto').onclick=()=>{if(sim.timer){stopAuto();$('#auto').textContent='▶ Automático';return}$('#auto').textContent='⏸ Pausar';sim.timer=setInterval(()=>{if(next()===false){stopAuto();$('#auto').textContent='▶ Automático';if(done)done()}},700)}}

function labGcd(c){shell(c,'<div class="field"><label>m</label><input id="m" type="number" value="60"></div><div class="field"><label>n</label><input id="n" type="number" value="24"></div><button class="btn" id="build">Preparar</button>','',`<div class="card"><h3>División actual</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="steps">0</b>divisiones</div><div class="metric"><b id="result">—</b>MCD</div><div class="metric"><b>log n</b>orden</div></div></div><div class="card"><h3>Pseudocódigo</h3><pre class="pseudo" id="ps"><span>mientras n ≠ 0</span><span>  r ← m mod n</span><span>  m ← n</span><span>  n ← r</span><span>retornar m</span></pre></div>`);let S=[],i=0;function build(){let a=Math.abs(+$(`#m`).value),b=Math.abs(+$(`#n`).value);S=[];while(b){S.push([a,b,a%b]);[a,b]=[b,a%b]}S.push([a,0,0]);i=0;draw()}function draw(){const [a,b,r]=S[i];$('#viz').innerHTML=`<div class="array"><div><div class="box active">${a}</div><div class="idx">m</div></div><div style="font-size:30px">mod</div><div><div class="box source">${b}</div><div class="idx">n</div></div><div style="font-size:30px">=</div><div><div class="box ${b?'':'good'}">${b?r:a}</div><div class="idx">${b?'resto':'MCD'}</div></div></div>`;$('#formula').textContent=b?`${a} mod ${b} = ${r}`:`MCD = ${a}`;$('#explain').textContent=b?'El divisor pasa a ser el nuevo dividendo y el resto, el nuevo divisor.':'Al llegar a resto cero, el último divisor no nulo es el MCD.';$('#steps').textContent=i;$('#result').textContent=b?'—':a;setPseudo('ps',b?1:4);if(!b)award('lab1')}function next(){if(i>=S.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labGrowth(c){shell(c,'<div class="field"><label>Máximo n</label><input id="maxN" type="range" min="10" max="100" value="40"><output id="nout">40</output></div><button class="btn" id="plot">Graficar</button>','',`<div class="card"><h3>Interpreta la escala</h3><p class="explain">Las curvas se normalizan verticalmente para poder comparar sus formas. Observa qué funciones se disparan primero.</p><div class="metrics"><div class="metric"><b>log n</b>muy lento</div><div class="metric"><b>n log n</b>eficiente</div><div class="metric"><b>2ⁿ</b>explosivo</div></div></div><div class="card"><h3>Clases</h3><div class="legend"><span><i style="background:var(--green)"></i>log n</span><span><i style="background:var(--brand)"></i>n</span><span><i style="background:var(--purple)"></i>n log n</span><span><i style="background:var(--orange)"></i>n²</span><span><i style="background:var(--red)"></i>2ⁿ</span></div></div>`);function plot(){const N=+$(`#maxN`).value,W=760,H=340,pad=42,fs=[['log n',x=>Math.log2(Math.max(1,x)),'var(--green)'],['n',x=>x,'var(--brand)'],['n log n',x=>x*Math.log2(Math.max(1,x)),'var(--purple)'],['n²',x=>x*x,'var(--orange)'],['2ⁿ',x=>2**Math.min(x,15),'var(--red)']];let h=`<svg class="svg" viewBox="0 0 ${W} ${H}"><line x1="${pad}" y1="10" x2="${pad}" y2="${H-pad}" stroke="var(--line)"/><line x1="${pad}" y1="${H-pad}" x2="${W-10}" y2="${H-pad}" stroke="var(--line)"/>`;fs.forEach(([name,f,col])=>{const vals=Array.from({length:N},(_,i)=>f(i+1)),mx=Math.max(...vals),pts=vals.map((v,i)=>`${pad+i*(W-pad-18)/(N-1)},${H-pad-v*(H-pad-25)/mx}`).join(' ');h+=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="4"/><text x="${W-75}" y="${25+fs.findIndex(z=>z[0]===name)*22}" fill="${col}" font-weight="800">${name}</text>`});h+='</svg>';$('#viz').innerHTML=h;award('lab2')}$('#plot').onclick=plot;$('#maxN').oninput=e=>$('#nout').textContent=e.target.value;plot()}
function labBrute(c){shell(c,'<div class="field"><label>Algoritmo</label><select id="sortAlg"><option value="selection">Selection Sort</option><option value="bubble">Bubble Sort</option></select></div><div class="field"><label>Datos</label><input id="arr" value="7,3,9,2,6,1"></div><button class="btn" id="build">Preparar</button>','',`<div class="card"><h3>Operación actual</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="comp">0</b>comparaciones</div><div class="metric"><b id="swaps">0</b>intercambios</div><div class="metric"><b>Θ(n²)</b>orden</div></div></div><div class="card"><h3>Lectura visual</h3><div class="legend"><span><i style="background:var(--orange)"></i>comparando</span><span><i style="background:var(--green)"></i>posición final</span></div></div>`);let steps=[],i=0;function build(){let a=parse($('#arr').value,-99,99);steps=[{a:[...a],x:[],done:0,c:0,s:0,msg:'Estado inicial'}];let c0=0,s0=0;if($('#sortAlg').value==='selection'){for(let p=0;p<a.length-1;p++){let m=p;for(let j=p+1;j<a.length;j++){c0++;steps.push({a:[...a],x:[m,j],done:p,c:c0,s:s0,msg:`Comparar ${a[m]} y ${a[j]}`});if(a[j]<a[m])m=j}if(m!==p){[a[p],a[m]]=[a[m],a[p]];s0++}steps.push({a:[...a],x:[p,m],done:p+1,c:c0,s:s0,msg:`Fijar ${a[p]} en la posición ${p}`})}}else{for(let end=a.length-1;end>0;end--)for(let j=0;j<end;j++){c0++;steps.push({a:[...a],x:[j,j+1],done:a.length-1-end,c:c0,s:s0,msg:`Comparar adyacentes ${a[j]} y ${a[j+1]}`});if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];s0++}}steps.push({a:[...a],x:[],done:a.length,c:c0,s:s0,msg:'Arreglo ordenado'});i=0;draw()}}function draw(){const z=steps[i],mx=Math.max(...z.a.map(Math.abs),1);$('#viz').innerHTML=`<div class="bars">${z.a.map((v,k)=>`<div class="bar ${z.x.includes(k)?'active':k<z.done?'done':''}" style="height:${35+190*Math.abs(v)/mx}px"><span>${v}</span></div>`).join('')}</div>`;$('#formula').textContent=z.msg;$('#explain').textContent='La fuerza bruta examina directamente los candidatos necesarios para decidir la siguiente posición.';$('#comp').textContent=z.c;$('#swaps').textContent=z.s;if(i===steps.length-1)award('lab3')}function next(){if(i>=steps.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labBinary(c){shell(c,'<div class="field"><label>Arreglo ordenado</label><input id="arr" value="2,5,8,12,16,23,38,56"></div><div class="field"><label>Buscar</label><input id="key" type="number" value="23"></div><button class="btn" id="build">Preparar</button>','',`<div class="card"><h3>Intervalo activo</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>comparaciones</div><div class="metric"><b id="remain">0</b>candidatos</div><div class="metric"><b>Θ(log n)</b>orden</div></div></div><div class="card"><h3>Pseudocódigo</h3><pre class="pseudo" id="ps"><span>l ← 0; r ← n−1</span><span>mientras l ≤ r</span><span>  m ← ⌊(l+r)/2⌋</span><span>  comparar A[m] con K</span><span>  descartar una mitad</span></pre></div>`);let a=[],key,steps=[],i=0;function build(){a=parse($('#arr').value,-999,999).sort((x,y)=>x-y);key=+$('#key').value;steps=[];let l=0,r=a.length-1;while(l<=r){let m=Math.floor((l+r)/2);steps.push({l,r,m,found:a[m]===key});if(a[m]===key)break;a[m]<key?l=m+1:r=m-1}if(!steps.length||!steps.at(-1).found)steps.push({l,r,m:-1,found:false,end:true});i=0;draw()}function draw(){const z=steps[i];$('#viz').innerHTML=`<div class="array">${a.map((v,k)=>`<div><div class="box ${k===z.m?'active':k<z.l||k>z.r?'bad':''}">${v}</div><div class="idx">${k}</div></div>`).join('')}</div>`;$('#formula').textContent=z.end?`${key} no está en el arreglo`:`medio = ${z.m}; A[${z.m}] = ${a[z.m]}`;$('#explain').textContent=z.found?'¡Objetivo encontrado!':z.end?'El intervalo quedó vacío.':a[z.m]<key?'El objetivo es mayor: descartamos la mitad izquierda.':'El objetivo es menor: descartamos la mitad derecha.';$('#step').textContent=i+1;$('#remain').textContent=Math.max(0,z.r-z.l+1);setPseudo('ps',z.end?1:z.found?3:4);if(z.found||z.end)award('lab4')}function next(){if(i>=steps.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labDivide(c){shell(c,'<div class="field"><label>Datos</label><input id="arr" value="8,3,6,2,7,1,5,4"></div><button class="btn" id="build">Construir árbol Mergesort</button>','',`<div class="card"><h3>Fase actual</h3><div class="formula" id="formula"></div><p class="explain">Azul: dividir. Naranja: combinar listas ordenadas.</p><div class="metrics"><div class="metric"><b id="level">0</b>nivel</div><div class="metric"><b id="parts">1</b>sublistas</div><div class="metric"><b>Θ(n log n)</b>orden</div></div></div><div class="card"><h3>Recurrencia</h3><div class="formula">T(n)=2T(n/2)+Θ(n)</div></div>`);let stages=[],i=0;function build(){const a=parse($('#arr').value,-99,99);let parts=[a];stages=[{p:parts.map(x=>[...x]),phase:'Inicio'}];while(parts.some(x=>x.length>1)){parts=parts.flatMap(x=>x.length>1?[x.slice(0,Math.ceil(x.length/2)),x.slice(Math.ceil(x.length/2))]:[x]);stages.push({p:parts.map(x=>[...x]),phase:'Dividir'})}while(parts.length>1){let next=[];for(let k=0;k<parts.length;k+=2)next.push(k+1<parts.length?[...parts[k],...parts[k+1]].sort((x,y)=>x-y):parts[k]);parts=next;stages.push({p:parts.map(x=>[...x]),phase:'Combinar'})}i=0;draw()}function draw(){const z=stages[i];$('#viz').innerHTML=`<div style="display:grid;gap:14px;padding:25px">${z.p.map(p=>`<div class="array" style="padding:0">${p.map(v=>`<div class="box ${z.phase==='Combinar'?'source':'active'}">${v}</div>`).join('')}</div>`).join('')}</div>`;$('#formula').textContent=`${z.phase}: ${z.p.length} sublista(s)`;$('#level').textContent=i;$('#parts').textContent=z.p.length;if(i===stages.length-1)award('lab5')}function next(){if(i>=stages.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labHeap(c){shell(c,'<div class="field"><label>Datos</label><input id="arr" value="2,9,7,6,5,8"></div><button class="btn" id="build">Construir max-heap</button>','',`<div class="card"><h3>Transformación</h3><div class="formula" id="formula"></div><p class="explain">Hundimos cada padre que viole la propiedad padre ≥ hijos.</p><div class="metrics"><div class="metric"><b id="step">0</b>intercambios</div><div class="metric"><b>O(n)</b>build-heap</div><div class="metric"><b>n log n</b>heapsort</div></div></div><div class="card"><h3>Representación</h3><p>El mismo arreglo representa un árbol completo: hijos de i en 2i+1 y 2i+2.</p></div>`);let steps=[],i=0;function build(){let a=parse($('#arr').value,-99,99);steps=[{a:[...a],x:[],msg:'Arreglo inicial'}];function down(k,n){for(;;){let l=2*k+1,r=l+1,m=k;if(l<n&&a[l]>a[m])m=l;if(r<n&&a[r]>a[m])m=r;if(m===k)break;[a[k],a[m]]=[a[m],a[k]];steps.push({a:[...a],x:[k,m],msg:`Intercambiar padre ${k} con hijo ${m}`});k=m}}for(let k=Math.floor(a.length/2)-1;k>=0;k--)down(k,a.length);steps.push({a:[...a],x:[],msg:'Max-heap construido'});i=0;draw()}function draw(){const z=steps[i],pos=[[380,45],[205,135],[555,135],[120,235],[290,235],[470,235],[640,235]];let h='<svg class="svg" viewBox="0 0 760 300">';z.a.forEach((v,k)=>{if(k){let p=Math.floor((k-1)/2);h+=`<line x1="${pos[p][0]}" y1="${pos[p][1]}" x2="${pos[k][0]}" y2="${pos[k][1]}" stroke="var(--line)" stroke-width="3"/>`}});z.a.forEach((v,k)=>h+=`<circle cx="${pos[k][0]}" cy="${pos[k][1]}" r="27" fill="${z.x.includes(k)?'var(--orange)':'var(--brand)'}"/><text x="${pos[k][0]}" y="${pos[k][1]+6}" text-anchor="middle" fill="white" font-size="18" font-weight="900">${v}</text>`);$('#viz').innerHTML=h+'</svg>';$('#formula').textContent=z.msg;$('#step').textContent=i;if(i===steps.length-1)award('lab6')}function next(){if(i>=steps.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labHash(c){shell(c,'<div class="field"><label>Claves</label><input id="keys" value="18,41,22,44,59,32,31"></div><div class="field"><label>Tamaño m</label><input id="size" type="number" min="5" max="13" value="7"></div><button class="btn" id="build">Insertar</button>','',`<div class="card"><h3>Hashing con encadenamiento</h3><div class="formula" id="formula">h(k)=k mod m</div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>claves</div><div class="metric"><b id="coll">0</b>colisiones</div><div class="metric"><b id="load">0</b>factor carga</div></div></div><div class="card"><h3>Idea</h3><p>Las colisiones no son errores: son situaciones normales que requieren una política de resolución.</p></div>`);let keys=[],m,step=0;function build(){keys=parse($('#keys').value,0,999);m=Math.max(5,Math.min(13,+$('#size').value||7));step=0;draw()}function draw(){const buckets=Array.from({length:m},()=>[]);keys.slice(0,step).forEach(k=>buckets[k%m].push(k));$('#viz').innerHTML=`<div style="display:grid;gap:7px;padding:20px">${buckets.map((b,i)=>`<div style="display:flex;gap:6px;align-items:center"><div class="box active">${i}</div><span>→</span>${b.map(k=>`<div class="box source">${k}</div>`).join('<span>→</span>')||'<span style="color:var(--muted)">vacío</span>'}</div>`).join('')}</div>`;const last=keys[step-1],coll=buckets.reduce((s,b)=>s+Math.max(0,b.length-1),0);$('#formula').textContent=last==null?'h(k)=k mod m':`h(${last})=${last} mod ${m}=${last%m}`;$('#explain').textContent=last==null?'Comienza con cubetas vacías.':buckets[last%m].length>1?'La cubeta ya tenía una clave: resolvemos la colisión encadenando.':'La clave entra sin colisión.';$('#step').textContent=step;$('#coll').textContent=coll;$('#load').textContent=(step/m).toFixed(2);if(step===keys.length)award('lab7')}function next(){if(step>=keys.length)return false;step++;draw();return true}function prev(){step=Math.max(0,step-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{step=0;draw()});build()}
function labDP(c){shell(c,'<div class="field"><label>Problema</label><select id="dpMode"><option value="coin">Coin-row</option><option value="change">Cambio mínimo</option><option value="ks">Mochila 0/1</option><option value="fib">Fibonacci</option><option value="floyd">Floyd</option></select></div><button class="btn" id="build">Preparar</button>','',`<div class="card"><h3>Dependencias</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>etapa</div><div class="metric"><b id="best">—</b>resultado</div><div class="metric"><b id="states">0</b>estados</div></div></div><div class="card"><h3>Colores</h3><div class="legend"><span><i style="background:var(--orange)"></i>dependencia</span><span><i style="background:var(--brand)"></i>estado actual</span><span><i style="background:var(--green)"></i>solución final</span></div></div>`);let mode='coin',steps=[],i=0;function build(){mode=$('#dpMode').value;steps=[];if(mode==='coin'){let a=[5,1,2,10,6,2],F=[0,a[0]];steps.push({vals:[0],deps:[],f:'F[0]=0',e:'Caso base'});for(let k=2;k<=a.length;k++){F[k]=Math.max(a[k-1]+F[k-2],F[k-1]);steps.push({vals:F.slice(0,k+1),deps:[k-2,k-1],f:`F[${k}]=max(${a[k-1]}+${F[k-2]},${F[k-1]})=${F[k]}`,e:'Comparamos tomar u omitir la moneda.',result:F[k]})}}else if(mode==='change'){let D=[1,3,4],F=[0];steps.push({vals:[0],deps:[],f:'F[0]=0',e:'Caso base'});for(let k=1;k<=6;k++){F[k]=1+Math.min(...D.filter(d=>d<=k).map(d=>F[k-d]));steps.push({vals:[...F],deps:D.filter(d=>d<=k).map(d=>k-d),f:`F[${k}]=1+min(${D.filter(d=>d<=k).map(d=>`F[${k-d}]`).join(',')})=${F[k]}`,e:'Probamos cada posible última moneda.',result:F[k]})}}else if(mode==='fib'){let F=[0,1];steps=[{vals:[0],deps:[],f:'F[0]=0',e:'Caso base'},{vals:[0,1],deps:[],f:'F[1]=1',e:'Caso base'}];for(let k=2;k<=10;k++){F[k]=F[k-1]+F[k-2];steps.push({vals:[...F],deps:[k-2,k-1],f:`F[${k}]=${F[k-1]}+${F[k-2]}=${F[k]}`,e:'Reutilizamos los dos valores anteriores.',result:F[k]})}}else if(mode==='ks'){let w=[2,1,3,2],v=[12,10,20,15],W=5,F=Array.from({length:5},()=>Array(6).fill(0));steps=[{table:F.map(r=>[...r]),f:'F[0,j]=0',e:'Sin objetos, valor cero'}];for(let x=1;x<=4;x++)for(let j=0;j<=W;j++){F[x][j]=w[x-1]<=j?Math.max(F[x-1][j],v[x-1]+F[x-1][j-w[x-1]]):F[x-1][j];steps.push({table:F.map(r=>[...r]),cur:[x,j],deps:[[x-1,j],[x-1,j-w[x-1]]],f:`F[${x},${j}]=${F[x][j]}`,e:w[x-1]<=j?'Comparamos excluir e incluir.':'El objeto no cabe.',result:F[x][j]})}}else{let D=[[0,3,Infinity,7],[8,0,2,Infinity],[5,Infinity,0,1],[2,Infinity,Infinity,0]];steps=[{table:D.map(r=>[...r]),f:'Matriz inicial',e:'Solo caminos directos'}];for(let k=0;k<4;k++){for(let x=0;x<4;x++)for(let j=0;j<4;j++)D[x][j]=Math.min(D[x][j],D[x][k]+D[k][j]);steps.push({table:D.map(r=>[...r]),f:`Permitir vértice ${'ABCD'[k]}`,e:'Actualizamos todos los pares usando el nuevo intermediario.',result:D[0][3]})}}i=0;draw()}function draw(){const z=steps[i];if(z.table){$('#viz').innerHTML='<div class="table-wrap"><table class="matrix">'+z.table.map((r,x)=>`<tr>${r.map((v,j)=>`<td class="${z.cur&&z.cur[0]===x&&z.cur[1]===j?'active':z.deps&&z.deps.some(d=>d[0]===x&&d[1]===j)?'source':''}">${Number.isFinite(v)?v:'∞'}</td>`).join('')}</tr>`).join('')+'</table></div>'}else $('#viz').innerHTML=`<div class="array">${z.vals.map((v,k)=>`<div><div class="box ${k===z.vals.length-1?'active':z.deps.includes(k)?'source':''}">${v}</div><div class="idx">F[${k}] ${z.deps.includes(k)?'↗':''}</div></div>`).join('')}</div>`;$('#formula').textContent=z.f;$('#explain').textContent=z.e;$('#step').textContent=i;$('#best').textContent=z.result??'—';$('#states').textContent=z.table?z.table.flat().filter(Number.isFinite).length:z.vals.length;if(i===steps.length-1)award('lab8',30)}function next(){if(i>=steps.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;$('#dpMode').onchange=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labMST(c){shell(c,'<div class="field"><label>Algoritmo</label><select id="mstMode"><option value="kruskal">Kruskal</option><option value="prim">Prim</option></select></div><button class="btn" id="build">Preparar grafo</button>','',`<div class="card"><h3>Elección greedy</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>aristas elegidas</div><div class="metric"><b id="weight">0</b>peso MST</div><div class="metric"><b>E log V</b>orden</div></div></div><div class="card"><h3>Regla</h3><p>Kruskal toma la arista más barata que no forme ciclo. Prim toma la más barata que conecte el árbol con un vértice exterior.</p></div>`);const P=[[100,70],[350,45],[630,95],[180,260],[480,270]],names='ABCDE',E=[[0,1,2],[0,3,6],[1,2,3],[1,3,8],[1,4,5],[2,4,7],[3,4,9]];let chosen=[],cands=[],i=0;function build(){chosen=[];if($('#mstMode').value==='kruskal'){let par=[0,1,2,3,4],find=x=>par[x]===x?x:par[x]=find(par[x]);for(const e of [...E].sort((a,b)=>a[2]-b[2]))if(find(e[0])!==find(e[1])){par[find(e[0])]=find(e[1]);chosen.push(e)}}else{let V=new Set([0]);while(V.size<5){const e=E.filter(x=>V.has(x[0])!==V.has(x[1])).sort((a,b)=>a[2]-b[2])[0];chosen.push(e);V.add(e[0]);V.add(e[1])}}i=0;draw()}function draw(){let h='<svg class="svg" viewBox="0 0 730 340">';E.forEach(e=>{const sel=chosen.slice(0,i).includes(e),[a,b,w]=e;h+=`<line x1="${P[a][0]}" y1="${P[a][1]}" x2="${P[b][0]}" y2="${P[b][1]}" stroke="${sel?'var(--green)':'var(--line)'}" stroke-width="${sel?6:3}"/><text x="${(P[a][0]+P[b][0])/2}" y="${(P[a][1]+P[b][1])/2-7}" fill="var(--text)" font-weight="900">${w}</text>`});P.forEach((p,k)=>h+=`<circle cx="${p[0]}" cy="${p[1]}" r="25" fill="var(--brand)"/><text x="${p[0]}" y="${p[1]+6}" text-anchor="middle" fill="white" font-weight="900">${names[k]}</text>`);$('#viz').innerHTML=h+'</svg>';const e=chosen[i-1];$('#formula').textContent=e?`Elegir ${names[e[0]]}–${names[e[1]]} (peso ${e[2]})`:'Árbol vacío';$('#explain').textContent=e?'Es la arista factible de menor peso en esta etapa.':'Comenzamos sin aristas.';$('#step').textContent=i;$('#weight').textContent=chosen.slice(0,i).reduce((s,e)=>s+e[2],0);if(i===4)award('lab9')}function next(){if(i>=chosen.length)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labStable(c){shell(c,'<button class="btn" id="build">Nuevo proceso</button>','',`<div class="card"><h3>Propuesta actual</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>propuestas</div><div class="metric"><b id="pairs">0</b>parejas</div><div class="metric"><b>O(n²)</b>orden</div></div></div><div class="card"><h3>Preferencias</h3><p>A: X,Y,Z · B: Y,X,Z · C: Y,Z,X</p><p>X: B,A,C · Y: A,C,B · Z: C,B,A</p></div>`);const M=['A','B','C'],W=['X','Y','Z'],pm=[[0,1,2],[1,0,2],[1,2,0]],pw=[[1,0,2],[0,2,1],[2,1,0]];let states=[],i=0;function build(){let next=[0,0,0],eng=Array(3).fill(-1),free=[0,1,2];states=[{eng:[...eng],msg:'Todos están libres'}];while(free.length){let m=free.shift(),w=pm[m][next[m]++],old=eng[w];if(old<0){eng[w]=m;states.push({eng:[...eng],m,w,msg:`${M[m]} propone a ${W[w]}: acepta`})}else if(pw[w].indexOf(m)<pw[w].indexOf(old)){eng[w]=m;free.push(old);states.push({eng:[...eng],m,w,msg:`${W[w]} prefiere a ${M[m]}; libera a ${M[old]}`})}else{free.push(m);states.push({eng:[...eng],m,w,msg:`${W[w]} rechaza a ${M[m]}`})}}i=0;draw()}function draw(){const z=states[i];$('#viz').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:50px;padding:30px"><div>${M.map((m,k)=>`<div class="box" style="margin:15px auto">${m}</div>`).join('')}</div><div>${W.map((w,k)=>`<div class="box ${z.eng[k]>=0?'good':''}" style="margin:15px auto">${w}${z.eng[k]>=0?'–'+M[z.eng[k]]:''}</div>`).join('')}</div></div>`;$('#formula').textContent=z.msg;$('#explain').textContent='Cada persona propone siguiendo su lista; una aceptación puede ser reemplazada por una propuesta preferida.';$('#step').textContent=i;$('#pairs').textContent=z.eng.filter(x=>x>=0).length;if(i===states.length-1)award('lab10')}function next(){if(i>=states.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}
function labNP(c){const problems=[['Ordenar n números','P'],['Camino más corto','P'],['Árbol de expansión mínima','P'],['Circuito Hamiltoniano','NP-completo'],['TSP decisión','NP-completo'],['3-SAT','NP-completo'],['Coloreo de grafos decisión','NP-completo'],['Problema de parada','Indecidible']];shell(c,'<button class="btn" id="new">Mezclar problemas</button>','',`<div class="card"><h3>Clasificador</h3><p class="explain">Selecciona la clase correcta para el problema destacado. NP no significa “no polinómico”.</p><div class="controls"><button class="btn sec cls" data-c="P">P</button><button class="btn sec cls" data-c="NP-completo">NP-completo</button><button class="btn sec cls" data-c="Indecidible">Indecidible</button></div><p class="feedback" id="feedback"></p><div class="metrics"><div class="metric"><b id="score">0</b>aciertos</div><div class="metric"><b id="left">8</b>restantes</div><div class="metric"><b>?</b>P vs NP</div></div></div><div class="card"><h3>Reducción polinómica</h3><div class="formula">A ≤p B</div><p>Si A se reduce a B, un algoritmo eficiente para B permitiría resolver A eficientemente.</p></div>`);let order=[],idx=0,score=0;function start(){order=[...problems].sort(()=>Math.random()-.5);idx=score=0;draw()}function draw(){if(idx>=order.length){$('#viz').innerHTML='<div class="hero"><h2>Clasificación completada</h2><p>La dificultad computacional requiere distinguir resolución, verificación y decidibilidad.</p></div>';award('lab11');return}$('#viz').innerHTML=`<div style="display:grid;place-items:center;height:310px"><div class="box active" style="width:330px;height:130px;font-size:21px;text-align:center;padding:12px">${order[idx][0]}</div></div>`;$('#score').textContent=score;$('#left').textContent=order.length-idx;$('#feedback').textContent=''}$$('.cls').forEach(b=>b.onclick=()=>{if(idx>=order.length)return;const ok=b.dataset.c===order[idx][1];$('#feedback').innerHTML=ok?'<span class="goodtext">✓ Correcto</span>':`<span class="badtext">Es ${order[idx][1]}</span>`;if(ok)score++;setTimeout(()=>{idx++;draw()},450)});$('#new').onclick=start;start()}
function labQueens(c){shell(c,'<button class="btn" id="build">Resolver 4-Reinas</button>','',`<div class="card"><h3>Árbol de estado</h3><div class="formula" id="formula"></div><p class="explain" id="explain"></p><div class="metrics"><div class="metric"><b id="step">0</b>estados</div><div class="metric"><b id="pruned">0</b>podas</div><div class="metric"><b>exp.</b>peor caso</div></div></div><div class="card"><h3>Colores</h3><div class="legend"><span><i style="background:var(--brand)"></i>reina válida</span><span><i style="background:var(--red)"></i>conflicto y poda</span></div></div>`);let states=[],i=0,pruned=0;function build(){states=[];pruned=0;function safe(q,r,c){return q.every((rr,cc)=>rr!==r&&Math.abs(rr-r)!==Math.abs(cc-c))}function bt(q,c){if(c===4){states.push({q:[...q],try:null,msg:'Solución encontrada'});return true}for(let r=0;r<4;r++){const ok=safe(q,r,c);states.push({q:[...q],try:[r,c],ok,msg:ok?`Colocar en (${r+1},${c+1})`:`Conflicto en (${r+1},${c+1}): podar`});if(!ok){pruned++;continue}q.push(r);if(bt(q,c+1))return true;q.pop();states.push({q:[...q],try:null,msg:'Retroceder'})}return false}bt([],0);i=0;draw()}function draw(){const z=states[i];let cells='';for(let r=0;r<4;r++)for(let col=0;col<4;col++){const queen=z.q[col]===r,trying=z.try&&z.try[0]===r&&z.try[1]===col;cells+=`<div class="cellq ${queen||trying&&z.ok?'queen':trying?'conflict':''}" style="background-color:${(r+col)%2&&!queen&&!trying?'var(--panel2)':''}">${queen||trying?'♛':''}</div>`}$('#viz').innerHTML=`<div class="mini-grid" style="margin-top:45px">${cells}</div>`;$('#formula').textContent=z.msg;$('#explain').textContent=z.ok===false?'Esta rama no puede llevar a una solución y se elimina.':'Avanzamos columna por columna conservando solo posiciones seguras.';$('#step').textContent=i+1;$('#pruned').textContent=states.slice(0,i+1).filter(x=>x.ok===false).length;if(i===states.length-1)award('lab12')}function next(){if(i>=states.length-1)return false;i++;draw();return true}function prev(){i=Math.max(0,i-1);draw()}$('#build').onclick=build;ctl(prev,next,()=>{i=0;draw()});build()}

function renderQuiz(c){const best=state.quiz[c.n]||0;$('#chapterBody').innerHTML=`<form class="card" id="quizForm"><div class="tag">Mejor resultado: ${best}/5 · aprobación 4/5</div>${c.quiz.map((q,i)=>`<div class="quiz-q"><h3>${i+1}. ${q[0]}</h3><div class="opts">${q[1].map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('')}</div></div>`).join('')}<button class="btn" type="submit">Enviar evaluación</button></form><div class="card" id="quizResult" style="display:none;margin-top:12px"></div>`;$('#quizForm').onsubmit=e=>{e.preventDefault();let s=0;c.quiz.forEach((q,i)=>{const x=$(`input[name=q${i}]:checked`);if(x&&+x.value===q[2])s++});const r=$('#quizResult');r.style.display='block';r.innerHTML=`<h3>${s>=4?'¡Capítulo aprobado!':'Revisa los conceptos'}</h3><div style="font-size:34px;font-weight:950;color:var(--brand)">${s}/5</div><p>${s>=4?'Puedes avanzar al siguiente capítulo.':'Vuelve al laboratorio y analiza las decisiones paso a paso.'}</p>`;if(s>(state.quiz[c.n]||0)){if((state.quiz[c.n]||0)<4&&s>=4)state.xp+=40;state.quiz[c.n]=s;save();if(s>=4)toast('+40 XP · evaluación aprobada')}}}
function renderGlossary(){stopAuto();$('#crumb').textContent='Glosario y progreso';const labs=chapters.filter(c=>state.completed.includes('lab'+c.n)).length,passed=chapters.filter(c=>(state.quiz[c.n]||0)>=4).length;$('#view').innerHTML=`<div class="chapter-head"><div><div class="eyebrow">Resumen global</div><h2>Glosario y progreso</h2></div></div><div class="stats"><div class="stat"><b>${labs}/12</b><span>laboratorios</span></div><div class="stat"><b>${passed}/12</b><span>evaluaciones</span></div><div class="stat"><b>${state.xp}</b><span>XP</span></div><div class="stat"><b>${Math.round(100*(labs+passed)/24)}%</b><span>progreso</span></div></div><div class="card"><h3>Estado por capítulo</h3><div class="table-wrap"><table class="complexity"><thead><tr><th>Capítulo</th><th>Laboratorio</th><th>Evaluación</th><th>Acción</th></tr></thead><tbody>${chapters.map(c=>`<tr><td>${c.n}. ${c.title}</td><td>${state.completed.includes('lab'+c.n)?'✓':'—'}</td><td>${state.quiz[c.n]||0}/5</td><td><button class="btn sec" data-go="${c.n}">Abrir</button></td></tr>`).join('')}</tbody></table></div></div><h2 style="margin-top:22px">Glosario esencial</h2><div class="glossary">${glossary.map(([a,b])=>`<div class="term"><b>${a}</b><span>${b}</span></div>`).join('')}</div><div class="card" style="margin-top:15px"><h3>Gestión del progreso</h3><div class="controls"><button class="btn sec" id="export">Exportar JSON</button><button class="btn red" id="reset">Borrar progreso</button></div></div>`;wireGo();$('#export').onclick=()=>{const blob=new Blob([JSON.stringify({titulo:'Libro Interactivo de Análisis de Algoritmos',fecha:new Date().toISOString(),...state},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='progreso_algoritmos.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};$('#reset').onclick=()=>$('#resetModal').classList.add('show')}
function wireGo(){$$('[data-go]').forEach(x=>x.onclick=()=>go(x.dataset.go))}
$('#themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=state.theme;save()};$('#menuBtn').onclick=()=>$('#side').classList.toggle('open');$('#resetNo').onclick=()=>$('#resetModal').classList.remove('show');$('#resetYes').onclick=()=>{localStorage.removeItem('algoLibroCompleto');state={...base,completed:[],quiz:{}};$('#resetModal').classList.remove('show');go('home');toast('Progreso eliminado')};document.documentElement.dataset.theme=state.theme;navBuild();go(state.last||'home');updateProgress();
})();
</script>
